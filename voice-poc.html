<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>EWR Live Voice — POC</title>
<style>
  :root{--navy:#011624;--accent:#5230da;--cyan:#37dbff;--muted:#67737c;--border:#dfe3e6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#fbfcff,#f4f5fb);min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;padding:28px 16px}
  .card{width:100%;max-width:440px;background:#fff;border:1px solid var(--border);
    border-radius:20px;padding:24px 22px;box-shadow:0 18px 50px -18px rgba(1,22,36,.18)}
  .tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;
    letter-spacing:.14em;color:#5b3fd6;background:rgba(82,48,218,.08);
    border:1px solid rgba(82,48,218,.25);border-radius:999px;padding:5px 12px;margin-bottom:14px}
  h1{font-size:22px;color:var(--navy);letter-spacing:-.01em;margin-bottom:4px}
  .sub{font-size:13px;color:var(--muted);margin-bottom:20px}
  .ringwrap{display:flex;justify-content:center;margin:8px 0 18px}
  .ring{width:132px;height:132px;border-radius:50%;padding:4px;
    background:linear-gradient(135deg,var(--cyan),var(--accent));
    transition:transform .12s ease;display:flex;align-items:center;justify-content:center}
  .ring-in{width:100%;height:100%;border-radius:50%;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .ring-role{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--muted)}
  .ring-state{font-size:15px;font-weight:700;color:var(--navy)}
  .row{display:flex;gap:10px;margin-bottom:12px}
  button{flex:1;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.04em;
    border:none;border-radius:999px;padding:14px 18px;cursor:pointer;
    background:var(--accent);color:#fff;transition:background .15s}
  button:hover{background:#401d91}
  button:disabled{opacity:.5;cursor:default}
  button.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
  button.ghost:hover{background:var(--navy);color:#fff}
  .stat{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);
    border-top:1px solid #eef0f3;padding:9px 2px}
  .stat b{color:var(--navy);font-variant-numeric:tabular-nums}
  .vol{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);margin:6px 0 12px}
  .vol input{flex:1}
  .meter{height:8px;border-radius:999px;background:#eef0f3;overflow:hidden;margin:0 0 14px}
  .meter i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--cyan),var(--accent));transition:width .1s linear}
  .log{margin-top:14px;background:#0d2230;color:#9fd9ec;font:11px/1.6 Consolas,monospace;
    border-radius:10px;padding:10px 12px;max-height:160px;overflow:auto;white-space:pre-wrap}
  .hint{font-size:11.5px;color:#99a2a7;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <span class="tag"><span id="dot">●</span> EWR LIVE VOICE — POC</span>
  <h1 id="title">Live Voice test</h1>
  <p class="sub" id="sub">…</p>

  <div class="ringwrap"><div class="ring" id="ring"><div class="ring-in">
    <span class="ring-role" id="ringRole"></span>
    <span class="ring-state" id="ringState">idle</span>
  </div></div></div>

  <div class="meter" id="meterWrap" hidden><i id="meter"></i></div>
  <div class="vol" id="volWrap" hidden>Volume <input type="range" id="vol" min="0" max="100" value="100"></div>

  <div class="row">
    <button id="btnMain">Start</button>
    <button id="btnMute" class="ghost" hidden>Mute</button>
  </div>
  <div class="row"><button id="btnAudio" class="ghost" hidden>Tap if you hear nothing</button></div>

  <div class="stat"><span>Status</span><b id="stStatus">idle</b></div>
  <div class="stat"><span>Elapsed</span><b id="stTime">0:00</b></div>
  <div class="stat" id="stCountRow"><span id="stCountLbl">Listeners</span><b id="stCount">0</b></div>

  <div class="log" id="log"></div>
  <p class="hint" id="hint"></p>
</div>

<script type="module">
import { Room, RoomEvent, Track } from 'https://esm.sh/livekit-client@2';

const TOKEN_URL = 'https://lhyychkrcrndjptptkii.supabase.co/functions/v1/livekit-token';
const PW = 'ewrpoc_x7k2m9';

const P = new URLSearchParams(location.search);
const role = P.get('role') === 'host' ? 'host' : 'listen';
const roomName = P.get('room') || 'poc';
const myName = P.get('name') || (role === 'host' ? 'Maker' : 'Listener');

const $ = id => document.getElementById(id);
const log = m => {
  const t = new Date().toLocaleTimeString('en-GB');
  $('log').textContent += `[${t}] ${m}\n`;
  $('log').scrollTop = $('log').scrollHeight;
};

$('title').textContent = role === 'host' ? '🎙 Maker — voice host' : '🎧 Listener';
$('sub').textContent = role === 'host'
  ? 'You publish your microphone. Open ?role=listen on other devices to hear it.'
  : 'You will hear the maker live. Start, then just listen.';
$('ringRole').textContent = role.toUpperCase();
$('btnMain').textContent = role === 'host' ? 'Go live with your voice' : 'Listen live';
$('stCountLbl').textContent = role === 'host' ? 'Listeners' : 'Maker online';
$('hint').textContent = role === 'host'
  ? 'Keep this tab in the foreground. Screen wake lock is requested automatically.'
  : 'If audio stops when the screen locks, note the time and tell Claude.';

let lk = null, connected = false, muted = false, t0 = 0, timer = null;
let audioCtx = null, rafId = null, audioEl = null;

function setState(s){ $('ringState').textContent = s; $('stStatus').textContent = s; }
function tickTime(){
  const s = Math.floor((Date.now() - t0) / 1000);
  $('stTime').textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function meterFrom(mediaStreamTrack){
  try{
    if(rafId) cancelAnimationFrame(rafId);
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(new MediaStream([mediaStreamTrack]));
    const an = audioCtx.createAnalyser();
    an.fftSize = 256;
    src.connect(an);
    const buf = new Uint8Array(an.frequencyBinCount);
    $('meterWrap').hidden = false;
    (function loop(){
      an.getByteFrequencyData(buf);
      let sum = 0; for(let i = 0; i < buf.length; i++) sum += buf[i];
      const lvl = Math.min(1, (sum / buf.length) / 90);
      $('meter').style.width = (lvl * 100).toFixed(0) + '%';
      $('ring').style.transform = 'scale(' + (1 + lvl * 0.07).toFixed(3) + ')';
      rafId = requestAnimationFrame(loop);
    })();
  }catch(e){ log('meter error: ' + e.message); }
}

async function getToken(){
  const u = `${TOKEN_URL}?pw=${PW}&role=${role}&room=${encodeURIComponent(roomName)}&name=${encodeURIComponent(myName)}`;
  const r = await fetch(u);
  if(!r.ok) throw new Error('token http ' + r.status);
  return r.json();
}

function updateCount(){
  if(!lk) return;
  if(role === 'host'){
    $('stCount').textContent = String(lk.remoteParticipants.size);
  } else {
    let makerOn = false;
    lk.remoteParticipants.forEach(p => { if(p.audioTrackPublications.size > 0) makerOn = true; });
    $('stCount').textContent = makerOn ? 'yes' : 'not yet';
  }
}

async function connect(){
  $('btnMain').disabled = true;
  setState('connecting…');
  try{
    const { token, url } = await getToken();
    log('token ok');
    lk = new Room();
    lk.on(RoomEvent.Connected, () => { log('connected to room'); });
    lk.on(RoomEvent.Disconnected, r => { log('disconnected: ' + r); setState('disconnected'); });
    lk.on(RoomEvent.Reconnecting, () => { log('reconnecting…'); setState('reconnecting…'); });
    lk.on(RoomEvent.Reconnected, () => { log('reconnected'); setState('live'); });
    lk.on(RoomEvent.ParticipantConnected, p => { log('joined: ' + (p.name || p.identity)); updateCount(); });
    lk.on(RoomEvent.ParticipantDisconnected, p => { log('left: ' + (p.name || p.identity)); updateCount(); });
    lk.on(RoomEvent.TrackSubscribed, (track, pub, p) => {
      if(track.kind !== 'audio') return;
      log('audio track from ' + (p.name || p.identity));
      audioEl = track.attach();
      audioEl.setAttribute('playsinline', '');
      document.body.appendChild(audioEl);
      audioEl.volume = Number($('vol').value) / 100;
      $('volWrap').hidden = false;
      meterFrom(track.mediaStreamTrack);
      setState('live');
      updateCount();
    });
    lk.on(RoomEvent.TrackUnsubscribed, (track) => {
      if(track.kind !== 'audio') return;
      log('maker audio ended');
      track.detach().forEach(el => el.remove());
      setState('waiting…');
      updateCount();
    });
    lk.on(RoomEvent.AudioPlaybackStatusChanged, () => {
      if(!lk.canPlaybackAudio){ $('btnAudio').hidden = false; log('audio blocked — tap the button'); }
      else $('btnAudio').hidden = true;
    });

    await lk.connect(url, token);
    connected = true;
    t0 = Date.now();
    timer = setInterval(tickTime, 1000);

    if(role === 'host'){
      await lk.localParticipant.setMicrophoneEnabled(true);
      const pub = lk.localParticipant.getTrackPublication(Track.Source.Microphone);
      if(pub && pub.track) meterFrom(pub.track.mediaStreamTrack);
      $('btnMute').hidden = false;
      setState('live');
      log('mic published');
      try{
        const wl = await navigator.wakeLock.request('screen');
        log('wake lock on');
        document.addEventListener('visibilitychange', async () => {
          if(document.visibilityState === 'visible'){
            try{ await navigator.wakeLock.request('screen'); log('wake lock re-acquired'); }catch(_){}
          } else { log('tab went to background'); }
        });
      }catch(_){ log('wake lock unavailable'); }
    } else {
      setState('waiting…');
      log('listening — waiting for the maker');
    }
    updateCount();
    $('btnMain').textContent = 'Leave';
    $('btnMain').disabled = false;
  }catch(e){
    log('ERROR: ' + (e.message || e));
    setState('error');
    $('btnMain').disabled = false;
    $('btnMain').textContent = 'Retry';
    connected = false;
  }
}

async function leave(){
  if(timer){ clearInterval(timer); timer = null; }
  if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
  if(lk){ await lk.disconnect(); lk = null; }
  connected = false;
  setState('idle');
  $('btnMain').textContent = role === 'host' ? 'Go live with your voice' : 'Listen live';
  $('btnMute').hidden = true;
  $('meterWrap').hidden = true;
  log('left room');
}

$('btnMain').addEventListener('click', () => { connected ? leave() : connect(); });
$('btnMute').addEventListener('click', async () => {
  muted = !muted;
  await lk.localParticipant.setMicrophoneEnabled(!muted);
  $('btnMute').textContent = muted ? 'Unmute' : 'Mute';
  setState(muted ? 'muted' : 'live');
  log(muted ? 'muted' : 'unmuted');
});
$('btnAudio').addEventListener('click', async () => { try{ await lk.startAudio(); $('btnAudio').hidden = true; log('audio unlocked'); }catch(e){ log('startAudio: ' + e.message); } });
$('vol').addEventListener('input', () => { if(audioEl) audioEl.volume = Number($('vol').value) / 100; });

log('ready — role: ' + role + ', room: ' + roomName);
</script>
</body>
</html>
