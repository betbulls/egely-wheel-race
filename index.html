<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egely Wheel Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<style>
  .app-header{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    padding-bottom:16px;margin-bottom:20px;
    border-bottom:1px solid var(--panel-border);
  }
  .nav{display:flex;gap:6px;flex:1}
  .nav a{
    font-family:'Montserrat',sans-serif;font-size:13px;font-weight:500;
    text-decoration:none;color:var(--muted);
    padding:7px 14px;border-radius:8px;transition:all .2s;
  }
  .nav a:hover{color:var(--white);background:rgba(255,255,255,0.05)}
  .nav a.active{color:var(--white);background:rgba(82,48,218,0.25)}

  /* Global Egely Wheel connection status bar */
  .ble-bar{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--panel-border);
    border-radius:30px;padding:6px 6px 6px 14px;font-size:12px;color:var(--muted);
  }
  .ble-bar .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:all .3s;flex-shrink:0}
  .ble-bar.connected .dot{background:#3ddc84;box-shadow:0 0 10px #3ddc84}
  .ble-bar.connecting .dot{background:var(--blue);box-shadow:0 0 10px var(--blue);animation:pulse 1.4s infinite}
  .ble-bar.error .dot{background:#ff5c5c;box-shadow:0 0 10px #ff5c5c}
  .ble-bar.connected{color:var(--white)}
  .ble-bar button{
    font-size:11px;font-weight:600;padding:6px 14px;border-radius:24px;
    background:var(--accent);color:var(--white);
  }
  .ble-bar button:hover:not(:disabled){background:#6a47f0}
  #bleText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}

  .placeholder{color:var(--muted);font-size:14px}

  /* Auth header area */
  .auth-area{display:flex;align-items:center;gap:10px}
  .auth-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;text-decoration:none;
    background:rgba(255,255,255,0.08);border:1px solid var(--panel-border);color:var(--white);
    padding:7px 14px;border-radius:8px;cursor:pointer;transition:background .2s}
  .auth-btn:hover{background:rgba(255,255,255,0.16)}
  .auth-email{font-size:12px;color:var(--muted);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .subscribe-note{margin-top:16px;font-size:14px;color:var(--muted);line-height:1.5}
  .subscribe-note p{margin-bottom:12px}
  .subscribe-note .btn-join{display:inline-block}
  .auth-user{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;max-width:190px}
  .auth-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0}
  .auth-avatar-initial{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent));font-family:'Montserrat',sans-serif;font-weight:600;font-size:13px;color:#fff}
  .profile-row{display:flex;align-items:center;gap:18px}
  .profile-avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent))}
  .profile-avatar img{width:100%;height:100%;object-fit:cover}
  .profile-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:28px;color:#fff}
  input[type=file]{color:var(--muted);font-size:13px;border:none;padding:0;background:none}

  /* Sessions view */
  .view-head{margin-bottom:22px}
  .page-title{font-size:34px;font-weight:500}
  .page-sub{color:var(--muted);font-size:15px;margin-top:2px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1 / -1}
  .form-actions{margin-top:18px;display:flex;align-items:center;gap:14px}
  .form-msg{font-size:13px;color:var(--muted)}
  .form-msg.ok{color:#3ddc84}
  .form-msg.err{color:#ff7c7c}
  .session-list{display:flex;flex-direction:column;gap:12px}
  .empty{color:var(--faint);font-size:14px;text-align:center;padding:24px 0}
  .session-card{
    background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);
    border-radius:12px;padding:16px 18px;display:flex;align-items:center;
    justify-content:space-between;gap:16px;flex-wrap:wrap;transition:border-color .2s;
  }
  .session-card.live{border-color:var(--accent);background:rgba(82,48,218,0.12)}
  .session-card.finished{opacity:.5}
  .session-main{display:flex;flex-direction:column;gap:4px;min-width:0}
  .session-name{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500}
  .session-meta{font-size:13px;color:var(--muted)}
  .session-organizer{display:inline-flex;align-items:center;gap:6px;vertical-align:middle}
  .session-organizer .organizer-name{color:var(--white)}
  .sess-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;vertical-align:middle}
  .sess-avatar-initial{display:inline-flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent));font-family:'Montserrat',sans-serif;
    font-weight:600;font-size:10px;color:#fff}
  .organizer-note{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-top:4px}
  .organizer-note .sess-avatar{width:24px;height:24px;font-size:11px}
  .organizer-note .organizer-label{color:var(--faint)}
  .organizer-note b{color:var(--white);font-weight:600}
  .session-right{display:flex;align-items:center;gap:14px}
  .badge{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    padding:4px 9px;border-radius:20px;font-weight:600}
  .badge.upcoming{background:rgba(0,51,255,0.2);color:#9db4ff}
  .badge.live{background:var(--accent);color:var(--white)}
  .badge.finished{background:rgba(255,255,255,0.1);color:var(--muted)}
  .countdown{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;
    font-variant-numeric:tabular-nums;min-width:78px;text-align:right}
  .countdown.live{color:#3ddc84}
  .btn-join{
    font-family:'Inter',sans-serif;text-decoration:none;font-size:13px;font-weight:600;
    background:var(--accent);color:var(--white);padding:9px 18px;border-radius:8px;transition:background .2s;
  }
  .btn-join:hover{background:#6a47f0}
  .btn-secondary{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
    background:rgba(255,255,255,0.07);color:var(--white);border:1px solid var(--panel-border);
    padding:8px 16px;border-radius:8px;transition:background .2s}
  .btn-secondary:hover{background:rgba(255,255,255,0.13)}
  .btn-secondary:disabled{opacity:.5;cursor:default}

  /* Connection (invitation) page */
  .connect-card{max-width:560px;margin:8px auto;background:rgba(255,255,255,0.04);
    border:1px solid var(--panel-border);border-radius:16px;padding:32px 30px;text-align:center}
  .connect-avatar{width:96px;height:96px;border-radius:50%;overflow:hidden;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .connect-avatar img{width:100%;height:100%;object-fit:cover}
  .connect-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:38px;color:#fff}
  .connect-eyebrow{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
  .connect-title{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:500;margin-top:4px}
  .connect-bio{color:var(--muted);font-size:15px;margin-top:12px;line-height:1.55}
  .connect-lead{color:var(--muted);font-size:15px;margin-top:12px}
  .connect-what{text-align:left;margin-top:24px;padding-top:20px;border-top:1px solid var(--panel-border)}
  .connect-what h2{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;margin-bottom:8px}
  .connect-what p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:10px}
  .connect-control{color:var(--faint)}
  .connect-action{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .connect-note{color:var(--muted);font-size:14px}
  .connect-note.ok{color:#3ddc84}

  /* Profile: connection link + following list */
  .link-row{display:flex;gap:10px;align-items:center}
  .link-input{flex:1;font-size:13px;color:var(--muted)}
  .following-list{display:flex;flex-direction:column;gap:10px}
  .following-row{display:flex;align-items:center;gap:12px}
  .following-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .following-avatar img{width:100%;height:100%;object-fit:cover}
  .following-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:15px;color:#fff}
  .following-name{flex:1;font-size:15px}

  /* Room view */
  .room-head{margin-bottom:8px}
  .room-title-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .room-title{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:500}
  .live-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;
    letter-spacing:0.1em;text-transform:uppercase;background:var(--accent);padding:5px 12px;border-radius:20px}
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.3}}
  .room-sub{color:var(--muted);font-size:14px;margin-top:2px}
  .name-gate{margin-top:18px}
  .room-hint{color:var(--muted);font-size:13px;margin-top:14px;text-align:center}
  .link{color:#9db4ff;text-decoration:none}
  .link:hover{text-decoration:underline}

  .leader-banner{display:flex;flex-direction:column;margin:18px 0;
    background:linear-gradient(120deg, rgba(82,48,218,0.35), rgba(0,51,255,0.16));
    border:1px solid rgba(82,48,218,0.6);border-radius:14px;padding:16px 20px}
  .lb-top{display:flex;align-items:center;gap:16px}
  .avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Montserrat',sans-serif;font-weight:600;font-size:16px;color:#fff;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .avatar.lg{width:52px;height:52px;font-size:20px}
  .lb-info{flex-shrink:0;min-width:0}
  .lb-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
  .lb-name{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-name.waiting{color:var(--muted);font-style:italic}
  .lb-spark{flex:1;min-width:80px;height:40px;display:block;background:rgba(0,0,0,0.18);border-radius:6px}
  .lb-metrics{display:flex;gap:18px;flex-shrink:0;text-align:center}
  .lb-expand{background:rgba(255,255,255,0.08);border:1px solid var(--panel-border);
    color:var(--white);width:36px;height:36px;border-radius:9px;font-size:13px;cursor:pointer;
    flex-shrink:0;transition:transform .25s, background .2s;padding:0;display:flex;align-items:center;justify-content:center}
  .lb-expand:hover{background:rgba(255,255,255,0.16)}
  .lb-expand.open{transform:rotate(180deg)}
  .lb-chart-wrap{margin-top:14px}
  .lb-chart{width:100%;height:170px;display:block;background:rgba(0,0,0,0.22);border-radius:8px}

  .group-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}
  .gstat{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:14px 16px;text-align:center}
  .gstat.time{background:rgba(82,48,218,0.14);border-color:rgba(82,48,218,0.5)}
  .gval{font-family:'Montserrat',sans-serif;font-size:32px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .glbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:7px}

  .scale{margin:18px 0 22px}
  .scale-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .scale-bar{height:12px;border-radius:6px;
    background:linear-gradient(90deg,var(--red) 0%,var(--red) 21%,var(--yellow) 25%,var(--yellow) 50%,var(--green) 54%,var(--green) 100%)}
  .scale-ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);font-family:'Montserrat',sans-serif;margin-top:5px}

  .board{display:flex;flex-direction:column;gap:12px}
  .racer{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;
    padding:14px 18px;display:flex;align-items:center;gap:16px;transition:transform .35s ease, border-color .3s}
  .rank{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;color:var(--faint);width:24px;text-align:center;flex-shrink:0}
  .racer-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
  .racer-name-row{display:flex;align-items:center;gap:8px;min-width:0}
  .racer-name{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .host-tag{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;
    background:rgba(82,48,218,0.3);border:1px solid rgba(82,48,218,0.6);color:#cdbcff;padding:2px 7px;border-radius:20px;flex-shrink:0}
  .spark{width:100%;height:32px;display:block;background:rgba(0,0,0,0.18);border-radius:5px}
  .metrics{display:flex;align-items:flex-start;gap:16px;flex-shrink:0;text-align:center}
  .metric{display:flex;flex-direction:column;align-items:center;min-width:42px}
  .metric-val{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums;transition:color .2s}
  .metric-val.avg{color:var(--white)}
  .metric-lbl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:6px}

  /* Results screen */
  .res-group{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:20px;text-align:center;margin:18px 0}
  .res-group-val{font-family:'Montserrat',sans-serif;font-size:48px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .res-group-lbl{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:8px}
  .res-h{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;margin:24px 0 12px}
  .res-h-sub{color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-size:12px;margin-left:6px}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .cat-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:16px}
  .cat-icon{width:26px;height:26px;color:var(--accent);margin-bottom:10px}
  .cat-icon svg{width:100%;height:100%;display:block}
  .cat-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600}
  .cat-desc{font-size:11px;color:var(--muted);margin:3px 0 10px;line-height:1.4}
  .cat-winner{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:500;color:var(--white);border-top:1px solid var(--panel-border);padding-top:9px}
  .res-list{display:flex;flex-direction:column;gap:12px}
  .res-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:16px}
  .res-rank{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;color:var(--faint);width:24px;text-align:center;flex-shrink:0}
  .res-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .res-curve{width:100%;height:34px;display:block;background:rgba(0,0,0,0.18);border-radius:5px}
  .zonebar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.06)}
  .zonebar span{display:block;height:100%}
  .z-red{background:var(--red)} .z-yellow{background:var(--yellow)} .z-green{background:var(--green)}
  .res-stats{display:flex;gap:14px;flex-shrink:0;text-align:center}
  .rs{display:flex;flex-direction:column;align-items:center;min-width:40px}
  .rs-val{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .rs-trend{font-size:13px}
  .rs-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .metric-legend{margin-top:18px;padding:16px;background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;font-size:12px;color:var(--muted);line-height:1.7}
  .metric-legend b{color:var(--white)}

  /* Verified / cheat-detection markers */
  .v-badge{flex-shrink:0}
  .v-badge.verified{color:#3ddc84;font-size:13px;font-weight:700}
  .v-badge.unverified{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
    color:#e0a23c;border:1px solid rgba(224,162,60,0.5);border-radius:20px;padding:2px 7px}
  .warn{color:#e0a23c}
  .check-field .check{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--white);
    text-transform:none;letter-spacing:0;cursor:pointer}
  .check-field .check input{width:16px;height:16px;accent-color:var(--accent)}
  .sess-verified{margin-left:9px;font-size:10px;font-weight:600;letter-spacing:0.08em;color:#3ddc84;
    border:1px solid rgba(61,220,132,0.4);border-radius:20px;padding:2px 7px;vertical-align:middle}
  .session-avg{font-size:13px;color:var(--muted);white-space:nowrap}
  .session-avg b{font-family:'Montserrat',sans-serif;color:var(--white);font-weight:600}

  /* Level-up celebration banner */
  .level-up-banner{
    margin-bottom:18px;padding:20px 24px;border-radius:16px;
    background:linear-gradient(135deg, #ffd479, #f5a623);color:#1a0e3a;
    display:flex;align-items:center;gap:18px;justify-content:center;text-align:center;
    box-shadow:0 12px 44px -14px rgba(255,180,80,0.75);
    animation:level-up-pop .55s ease-out;
  }
  .lub-sparkle{font-size:32px;line-height:1;animation:lub-sparkle 1.6s ease-in-out infinite}
  .lub-eyebrow{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.22em;
    text-transform:uppercase;opacity:0.78}
  .lub-title{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:500;margin-top:2px;line-height:1.2}
  @keyframes level-up-pop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes lub-sparkle{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.18);opacity:1}}

  /* Header level pill (next to user identity) */
  .header-level{display:inline-flex;align-items:center;gap:6px;
    background:linear-gradient(135deg, rgba(82,48,218,0.35), rgba(155,109,255,0.35));
    border:1px solid rgba(155,109,255,0.5);border-radius:99px;padding:5px 11px;
    text-decoration:none;color:inherit;font-size:11px;letter-spacing:0.04em;
    transition:border-color .2s,transform .2s}
  .header-level:hover{border-color:rgba(155,109,255,0.85);transform:translateY(-1px)}
  .header-level.lv-5{border-color:rgba(255,212,121,0.55)}
  .header-level.lv-6{background:linear-gradient(135deg, rgba(255,212,121,0.4), rgba(245,166,35,0.35));
    border-color:rgba(255,212,121,0.75)}
  .hl-num{font-family:'Montserrat',sans-serif;font-weight:600}
  .hl-name{font-family:'Inter',sans-serif;opacity:.9}

  /* Home Dashboard — Level card */
  .level-card{position:relative;overflow:hidden;margin-bottom:18px;padding:22px 24px;
    border-radius:16px;border:1px solid rgba(155,109,255,0.4);
    background:linear-gradient(135deg, rgba(82,48,218,0.32), rgba(0,51,255,0.12));
    display:flex;flex-direction:column;gap:14px}
  .level-card::before{content:'';position:absolute;inset:-40% -10% auto auto;
    width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle, rgba(155,109,255,0.35), transparent 70%);
    pointer-events:none}
  .level-card.level-tier-5{border-color:rgba(255,212,121,0.5)}
  .level-card.level-tier-6{border-color:rgba(255,212,121,0.7);
    background:linear-gradient(135deg, rgba(255,180,80,0.28), rgba(82,48,218,0.18))}
  .level-card.level-tier-6::before{background:radial-gradient(circle, rgba(255,212,121,0.4), transparent 70%)}
  .lc-top{display:flex;align-items:baseline;gap:14px;position:relative;flex-wrap:wrap}
  .lc-eyebrow{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.2em;
    text-transform:uppercase;color:rgba(255,255,255,0.6)}
  .lc-title{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:500;line-height:1;margin:0}
  .lc-bar{height:10px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;position:relative}
  .lc-bar-fill{height:100%;border-radius:99px;
    background:linear-gradient(90deg, #5230da, #b18bff);transition:width .6s ease}
  .level-card.level-tier-5 .lc-bar-fill,
  .level-card.level-tier-6 .lc-bar-fill{background:linear-gradient(90deg, #ffd479, #f5a623)}
  .lc-meta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
    font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .lc-next{color:#cdbcff}
  .level-card.level-tier-6 .lc-next{color:#ffd479}
  .lc-max{font-family:'Montserrat',sans-serif;font-size:18px;color:#ffd479}
  .lc-total{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--faint)}

  /* Home Dashboard */
  .dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:8px}
  .dash-stat{background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);
    border-radius:12px;padding:14px 16px}
  .dash-stat-val{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:500;line-height:1;font-variant-numeric:tabular-nums}
  .dash-stat-lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:7px}

  .dash-h{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;
    margin:28px 0 14px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .dash-h-sub{font-size:12px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400}
  .dash-empty{color:var(--muted);font-size:14px;background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-border);border-radius:12px;padding:16px;text-align:center}

  .dash-next{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .dash-milestone{background:linear-gradient(135deg, rgba(82,48,218,0.18), rgba(0,51,255,0.06));
    border:1px solid var(--panel-border);border-radius:12px;padding:14px 16px}
  .dash-milestone.tier-gold{border-color:rgba(255,212,121,0.35)}
  .dash-milestone.tier-special{border-color:rgba(155,109,255,0.4)}
  .dm-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .dm-icon{font-size:22px;line-height:1}
  .dm-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500}
  .dm-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;margin-bottom:6px}
  .dm-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
  .tier-bronze  .dm-bar-fill{background:#cd7f32}
  .tier-silver  .dm-bar-fill{background:#c9d1d9}
  .tier-gold    .dm-bar-fill{background:#ffd479}
  .tier-special .dm-bar-fill{background:linear-gradient(90deg,#5230da,#b18bff)}
  .dm-progress{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

  .dash-cat{margin-top:22px}
  .dash-cat-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .dash-cat-title{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
  .dash-cat-count{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
  .dash-badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .dash-badge{background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);
    border-radius:12px;padding:16px 12px;text-align:center;transition:transform .2s ease,border-color .2s ease}
  .dash-badge.unlocked{background:linear-gradient(160deg, rgba(255,255,255,0.06), rgba(82,48,218,0.06))}
  .dash-badge.unlocked.tier-bronze {border-color:rgba(205,127,50,0.55)}
  .dash-badge.unlocked.tier-silver {border-color:rgba(201,209,217,0.55)}
  .dash-badge.unlocked.tier-gold   {border-color:rgba(255,212,121,0.65);
    box-shadow:0 4px 24px -10px rgba(255,212,121,0.45)}
  .dash-badge.unlocked.tier-special{border-color:rgba(155,109,255,0.65);
    box-shadow:0 4px 28px -10px rgba(155,109,255,0.55)}
  .dash-badge.locked{opacity:0.45}
  .dash-badge.locked .db-icon{filter:grayscale(1)}
  .db-icon{font-size:34px;line-height:1;margin-bottom:8px}
  .db-title{font-size:13px;font-weight:500;line-height:1.3;min-height:34px}
  .db-status{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:0.04em}
  .db-status.unlocked{color:#3ddc84}
  .dash-badge{position:relative}
  .dash-badge.unlocked:hover{transform:translateY(-2px)}

  /* Recent achievements strip */
  .dash-recent{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .dash-recent-card{position:relative;background:linear-gradient(160deg, rgba(255,255,255,0.05), rgba(82,48,218,0.08));
    border:1px solid var(--panel-border);border-radius:12px;padding:16px 12px 14px;text-align:center}
  .dash-recent-card.tier-bronze {border-color:rgba(205,127,50,0.55)}
  .dash-recent-card.tier-silver {border-color:rgba(201,209,217,0.55)}
  .dash-recent-card.tier-gold   {border-color:rgba(255,212,121,0.65);box-shadow:0 4px 22px -10px rgba(255,212,121,0.45)}
  .dash-recent-card.tier-special{border-color:rgba(155,109,255,0.65);box-shadow:0 4px 26px -10px rgba(155,109,255,0.55)}
  .drc-icon{font-size:34px;line-height:1;margin-bottom:6px}
  .drc-title{font-size:12px;font-weight:500;line-height:1.3}

  /* NEW pulse + pill */
  .dash-new-pill{position:absolute;top:8px;right:8px;font-size:9px;letter-spacing:0.14em;
    text-transform:uppercase;background:#3ddc84;color:#0a1230;
    padding:2px 7px;border-radius:99px;font-weight:700;z-index:1}
  .dash-new-count{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
    background:#3ddc84;color:#0a1230;padding:3px 9px;border-radius:99px;font-weight:700}
  .is-new{animation:badge-pulse 2.4s ease-in-out infinite}
  @keyframes badge-pulse{
    0%, 100% { box-shadow: 0 4px 18px -8px rgba(61,220,132,0.55); }
    50%      { box-shadow: 0 4px 30px -4px rgba(61,220,132,0.95); }
  }

  /* Solo view */
  .solo-controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .solo-controls .field{flex:1;min-width:120px}
  .solo-controls button{flex-shrink:0}
  .solo-msg{margin-top:12px;font-size:13px;color:var(--muted)}
  .solo-msg.err{color:#ff7c7c}
  .solo-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .solo-num{text-align:center;padding:10px;background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);border-radius:10px}
  .solo-num-val{font-family:'Montserrat',sans-serif;font-size:40px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .solo-num-lbl{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:8px}
  .solo-verify{font-size:12px;font-weight:600;letter-spacing:0.04em;margin-bottom:12px;text-align:center}
  .solo-verify.good{color:#3ddc84}
  .solo-verify.bad{color:#e0a23c}
  .solo-chart-wrap{height:240px;background:rgba(0,0,0,0.22);border-radius:8px;padding:6px;margin-bottom:14px}
  .solo-chart-wrap canvas{width:100%;height:100%;display:block}
  textarea{background:rgba(255,255,255,0.06);color:var(--white);border:1px solid var(--panel-border);
    border-radius:8px;padding:11px 13px;font-size:14px;font-family:'Inter',sans-serif;width:100%;resize:vertical}
  textarea:focus{outline:none;border-color:var(--accent);background:rgba(82,48,218,0.12)}
  textarea::placeholder{color:var(--faint)}
  .led-bar{display:flex;gap:3px;height:26px}
  .led-cell{flex:1;background:rgba(255,255,255,0.06);border-radius:2px;transition:background .1s}
  .led-cell.lit.red{background:var(--red)}
  .led-cell.lit.yellow{background:var(--yellow)}
  .led-cell.lit.green{background:var(--green)}
  .eval-panel{text-align:center}
  .eval-level{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:600;margin-top:4px}
  .eval-meaning{color:var(--muted);font-size:14px;margin-top:4px}
  .eval-stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted);align-items:center}
  .eval-stats b{font-family:'Montserrat',sans-serif;font-size:20px;color:var(--white);margin-right:4px}
  .solo-saved{color:#3ddc84;font-size:12px;margin-top:12px}

  /* My measurements */
  .me-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:16px;margin-bottom:12px}
  .me-main{flex:1;min-width:0}
  .me-title-row{display:flex;align-items:center;gap:9px}
  .me-kind{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px;flex-shrink:0}
  .me-kind.solo{background:rgba(0,51,255,0.2);color:#9db4ff}
  .me-kind.session{background:rgba(82,48,218,0.25);color:#cdbcff}
  .me-title{font-family:'Montserrat',sans-serif;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .me-meta{font-size:12px;color:var(--muted);margin-top:4px}
  .me-host{display:inline-flex;align-items:center;gap:5px;vertical-align:middle}
  .me-host .sess-avatar{width:18px;height:18px;font-size:9px}
  .me-host-name{color:var(--white)}
  .me-stats{display:flex;gap:14px;flex-shrink:0;text-align:center}
  a.me-card{text-decoration:none;color:inherit;transition:border-color .2s}
  a.me-card:hover{border-color:var(--accent)}
  .d-meta{font-size:13px;color:var(--muted)}
  .d-comment{margin-top:18px;padding-top:16px;border-top:1px solid var(--panel-border)}
  .d-comment-lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .d-comment p{font-size:14px;line-height:1.6}
  .d-client-chip{display:inline-flex;align-items:center;gap:8px;margin-top:6px;
    padding:6px 12px 6px 6px;border-radius:24px;background:rgba(255,255,255,0.05);
    border:1px solid var(--panel-border)}
  .d-client-avatar{width:24px;height:24px;border-radius:50%;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .d-client-avatar img{width:100%;height:100%;object-fit:cover}
  .d-client-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:11px;color:#fff}
  .d-client-name{font-size:13px;color:var(--muted)}

  /* Clients energy wall */
  .energy-wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .client-card{display:flex;flex-direction:column;gap:12px;text-decoration:none;color:inherit;
    background:linear-gradient(160deg, rgba(82,48,218,0.18), rgba(0,51,255,0.06));
    border:1px solid var(--panel-border);border-radius:16px;padding:18px;transition:border-color .2s,transform .2s}
  .client-card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .client-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .client-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-left:auto}
  .client-avatar{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent))}
  .client-avatar img{width:100%;height:100%;object-fit:cover}
  .client-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:18px;color:#fff}
  .client-id{flex:1 1 140px;min-width:0}
  .client-name{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .client-sub{font-size:12px;color:var(--muted);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .client-spark{width:100%;height:48px;display:block}
  .client-metrics{display:flex;gap:16px}
  .cm{text-align:center}
  .cm-val{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:500}
  .cm-lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .client-level{font-size:13px;font-weight:600}
  .client-empty{font-size:13px;color:var(--faint)}
  .client-title-avatar{display:inline-flex;width:40px;height:40px;border-radius:50%;overflow:hidden;
    vertical-align:middle;margin-right:8px;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .client-title-avatar img{width:100%;height:100%;object-fit:cover}
  .client-title-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:16px;color:#fff}
  .live-pill-mini{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;
    letter-spacing:0.12em;text-transform:uppercase;background:#c0143c;color:#fff;
    padding:3px 9px;border-radius:20px;margin-left:auto;flex-shrink:0}
  .live-pill-mini .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
  .client-card.live{border-color:#c0143c;box-shadow:0 0 0 1px rgba(192,20,60,0.35),0 6px 24px -10px rgba(192,20,60,0.55)}

  .client-live-banner{margin:14px 0;padding:18px 22px;border-radius:16px;
    background:linear-gradient(120deg, rgba(192,20,60,0.22), rgba(82,48,218,0.12));
    border:1px solid rgba(192,20,60,0.55);display:flex;flex-direction:column;gap:12px}
  .live-head{display:flex;align-items:center;gap:12px}
  .live-title{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:500}
  .live-metrics{display:flex;gap:22px}
  .lm{text-align:left}
  .lm-val{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:500}
  .lm-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .live-curve{width:100%;height:170px;display:block}

  /* Session Pulse: Host / Group / You — three curves on one chart */
  .session-pulse{margin:18px 0;padding:16px 18px;border-radius:14px;
    background:linear-gradient(120deg, rgba(82,48,218,0.18), rgba(0,51,255,0.06));
    border:1px solid var(--panel-border);display:flex;flex-direction:column;gap:14px}
  .sp-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .sp-title{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--muted)}
  .sp-legend{display:flex;gap:14px;margin-left:auto;flex-wrap:wrap}
  .leg-item{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .leg-dot{width:14px;height:3px;border-radius:2px;display:inline-block}
  .leg-host .leg-dot{background:#f5a623}
  .leg-group .leg-dot{background:#9db4ff}
  .leg-me .leg-dot{background:#ffffff}
  .sp-chart{width:100%;height:210px;display:block}
  .sp-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sp-col{background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);
    border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-width:0}
  .sp-col-head{display:flex;align-items:center;gap:7px;min-width:0}
  .sp-col-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .sp-stats{display:flex;gap:14px}
  .ss{text-align:left;flex:1;min-width:0}
  .ss-val{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:500;font-variant-numeric:tabular-nums}
  .ss-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}

  @media (max-width:600px){
    #bleText{max-width:130px}
    .form-grid{grid-template-columns:1fr}
    .lb-spark{display:none}
    .res-stats{gap:10px}
    .rs{min-width:34px}
    .me-card{flex-direction:column;align-items:stretch;gap:10px;padding:14px}
    .me-title-row{flex-wrap:wrap}
    .me-stats{justify-content:space-between;gap:10px}
    .live-metrics{gap:14px}
    .lm-val{font-size:20px}
    .sp-metrics{grid-template-columns:1fr}
    .sp-chart{height:170px}
    .dash-stats{grid-template-columns:repeat(2,1fr)}
    .dash-next{grid-template-columns:1fr}
    .dash-badges{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
    .db-icon{font-size:28px}
    .db-title{font-size:12px;min-height:30px}
    .hl-name{display:none}
    .level-up-banner{padding:16px 18px;gap:10px}
    .lub-sparkle{font-size:24px}
    .lub-title{font-size:18px}
    .lc-title{font-size:24px}
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="wordmark">egely wheel</div>
  <nav class="nav">
    <a href="#/home" data-route="/home">Home</a>
    <a href="#/sessions" data-route="/sessions">Sessions</a>
    <a href="#/solo" data-route="/solo">Solo</a>
    <a href="#/me" data-route="/me">My measurements</a>
    <a href="#/clients" data-route="/clients" id="navClients" hidden>Clients</a>
  </nav>
  <div class="ble-bar idle" id="bleBar">
    <span class="dot"></span>
    <span id="bleText">Egely Wheel not connected</span>
    <button id="bleBtn">Connect</button>
  </div>
  <div class="auth-area" id="authArea"></div>
</header>

<main id="view"></main>

<script type="module" src="app.js"></script>

</body>
</html>
