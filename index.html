<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Egely Wheel Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<style>
  .app-header{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    padding-bottom:16px;margin-bottom:20px;
    border-bottom:1px solid var(--panel-border);
  }
  .nav{display:flex;gap:6px;flex:1;align-items:center;position:relative}
  .nav a{
    font-family:'Montserrat',sans-serif;font-size:13px;font-weight:500;
    text-decoration:none;color:var(--muted);
    padding:7px 14px;border-radius:8px;transition:all .2s;
    white-space:nowrap
  }
  .nav a:hover{color:var(--white);background:rgba(255,255,255,0.05)}
  .nav a.active{color:var(--white);background:rgba(82,48,218,0.25)}

  /* "More" button — surfaces secondary nav items on tight screens */
  .nav-more{display:none;align-items:center;justify-content:center;
    width:36px;height:34px;border-radius:8px;
    background:transparent;border:1px solid var(--panel-border);color:var(--muted);cursor:pointer;
    font-size:18px;line-height:1;padding:0;letter-spacing:0;transition:all .15s}
  .nav-more:hover{color:#fff;border-color:rgba(155,109,255,0.5);background:rgba(255,255,255,0.04)}
  .nav-more-menu{position:absolute;top:calc(100% + 8px);left:0;z-index:1000;
    background:linear-gradient(160deg, rgba(13,11,40,0.97), rgba(82,48,218,0.18));
    border:1px solid rgba(155,109,255,0.45);border-radius:12px;padding:6px;min-width:200px;
    box-shadow:0 24px 60px -16px rgba(0,0,0,0.7);
    animation:fab-menu-in .14s ease-out}
  .nav-more-menu a{display:block;padding:10px 14px;border-radius:8px;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#fff;
    text-decoration:none}
  .nav-more-menu a:hover{background:rgba(155,109,255,0.16)}

  /* Below the desktop breakpoint, hide the secondary nav links and expose
     them inside the "More" menu instead. */
  @media (max-width:760px){
    .nav-secondary{display:none}
    .nav-more{display:inline-flex}
  }

  /* ---- Compact mobile header --------------------------------------------- */
  /* Tighten spacing, padding and control sizes so logo + Home + More + BLE +
     Level + Avatar fit in as little vertical space as possible. No items are
     removed — this is purely a density pass. */
  @media (max-width:600px){
    body{padding:16px}
    .app-header{gap:8px 10px;padding-bottom:10px;margin-bottom:14px}
    .wordmark{font-size:13px;letter-spacing:0.18em}
    .nav{gap:4px}
    .nav a{padding:6px 10px;font-size:12px}
    .nav-more{width:32px;height:30px;font-size:16px}
    .ble-bar{padding:4px 4px 4px 11px;font-size:11px;gap:7px}
    .ble-bar button{padding:5px 11px;font-size:11px}
    /* .ble-bar prefix keeps these ahead of the base `.ble-short{display:none}`
       regardless of source order (this block precedes that rule in the file). */
    .ble-bar .ble-full{display:none}
    .ble-bar .ble-short{display:inline}
    .header-level{padding:4px 9px}
    .account-trigger{gap:6px;padding:3px 5px 3px 3px}
    .auth-avatar{width:26px;height:26px}
  }

  /* Global Egely Wheel connection status bar */
  .ble-bar{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--panel-border);
    border-radius:30px;padding:6px 6px 6px 14px;font-size:12px;color:var(--muted);
  }
  .ble-bar .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:all .3s;flex-shrink:0}
  .ble-bar.connected .dot{background:#3ddc84;box-shadow:0 0 10px #3ddc84}
  .ble-bar.connecting .dot{background:var(--blue);box-shadow:0 0 10px var(--blue);animation:pulse 1.4s infinite}
  .ble-bar.error .dot{background:#ff5c5c;box-shadow:0 0 10px #ff5c5c}
  .ble-bar.connected{color:var(--white)}
  .ble-bar button{
    font-size:11px;font-weight:600;padding:6px 14px;border-radius:24px;
    background:var(--accent);color:var(--white);
  }
  .ble-bar button:hover:not(:disabled){background:#6a47f0}
  #bleText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
  /* The header shows the full status on desktop and a terse one on mobile. */
  .ble-short{display:none}

  .placeholder{color:var(--muted);font-size:14px}

  /* Auth header area */
  .auth-area{display:flex;align-items:center;gap:10px}
  .auth-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;text-decoration:none;
    background:rgba(255,255,255,0.08);border:1px solid var(--panel-border);color:var(--white);
    padding:7px 14px;border-radius:8px;cursor:pointer;transition:background .2s}
  .auth-btn:hover{background:rgba(255,255,255,0.16)}
  .auth-email{font-size:12px;color:var(--muted);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .subscribe-note{margin-top:16px;font-size:14px;color:var(--muted);line-height:1.5}
  .subscribe-note p{margin-bottom:12px}
  .subscribe-note .btn-join{display:inline-block}
  .auth-user{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;max-width:190px}

  /* The user identity is now a dropdown trigger — clicking opens an account menu. */
  .auth-area{position:relative;display:flex;align-items:center;gap:10px}
  .account-trigger{display:flex;align-items:center;gap:8px;cursor:pointer;
    background:transparent;border:none;padding:4px 8px 4px 4px;border-radius:24px;
    color:inherit;font-family:'Inter',sans-serif;transition:background .15s}
  .account-trigger:hover{background:rgba(255,255,255,0.06)}
  .account-trigger .auth-email{max-width:140px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;font-size:13px}
  .account-chevron{font-size:9px;color:var(--muted);transition:transform .15s ease}
  .account-trigger[aria-expanded="true"] .account-chevron{transform:rotate(180deg)}
  .account-menu{position:absolute;top:calc(100% + 8px);right:0;z-index:1000;
    background:linear-gradient(160deg, rgba(13,11,40,0.97), rgba(82,48,218,0.18));
    border:1px solid rgba(155,109,255,0.45);border-radius:12px;padding:6px;min-width:200px;
    box-shadow:0 24px 60px -16px rgba(0,0,0,0.7);
    animation:fab-menu-in .14s ease-out}
  .account-menu a,
  .account-menu button{display:block;width:100%;text-align:left;
    padding:10px 14px;border-radius:8px;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#fff;
    text-decoration:none;background:transparent;border:none;cursor:pointer}
  .account-menu a:hover,
  .account-menu button:hover{background:rgba(155,109,255,0.16)}
  .account-menu hr{border:none;border-top:1px solid var(--panel-border);margin:4px 0}

  @media (max-width:520px){
    .account-trigger .auth-email{display:none}
  }

  /* On phones BOTH header menus (account + "More") become full-width bottom
     sheets. They are pinned to left:0/right:0 so the panel is exactly the
     viewport width at any size (320px and up) — a desktop-style dropdown with a
     fixed width + right:0 anchoring is what let them spill off-screen before.
     z-index sits above the FAB so the + button tucks behind the sheet. */
  @media (max-width:600px){
    .account-menu,
    .nav-more-menu{
      position:fixed;left:0;right:0;bottom:0;top:auto;
      width:auto;min-width:0;max-width:100%;z-index:1100;
      border:1px solid rgba(155,109,255,0.4);border-bottom:none;
      border-radius:18px 18px 0 0;
      background:linear-gradient(160deg, rgba(22,17,52,0.99), rgba(36,24,80,0.99));
      padding:8px 14px calc(16px + env(safe-area-inset-bottom, 0px));
      box-shadow:0 -18px 48px -12px rgba(0,0,0,0.7);
      animation:sheet-up .2s ease-out}
    .account-menu::before,
    .nav-more-menu::before{content:'';display:block;width:36px;height:4px;border-radius:99px;
      background:rgba(255,255,255,0.25);margin:6px auto 12px}
    .account-menu a,
    .account-menu button,
    .nav-more-menu a{display:block;width:100%;text-align:left;box-sizing:border-box;
      padding:14px 16px;font-size:15px;border-radius:8px}
    .account-menu hr{margin:6px 0}
  }
  @keyframes sheet-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .auth-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0}
  .auth-avatar-initial{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent));font-family:'Montserrat',sans-serif;font-weight:600;font-size:13px;color:#fff}
  .profile-row{display:flex;align-items:center;gap:18px}
  .profile-avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent))}
  .profile-avatar img{width:100%;height:100%;object-fit:cover}
  .profile-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:28px;color:#fff}
  input[type=file]{color:var(--muted);font-size:13px;border:none;padding:0;background:none}

  /* Sessions view */
  .view-head{margin-bottom:22px}
  .page-title{font-size:34px;font-weight:500}
  .page-sub{color:var(--muted);font-size:15px;margin-top:2px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1 / -1}
  .form-actions{margin-top:18px;display:flex;align-items:center;gap:14px}
  .form-msg{font-size:13px;color:var(--muted)}
  .form-msg.ok{color:#3ddc84}
  .form-msg.err{color:#ff7c7c}
  .sess-section{margin-bottom:28px}
  .sess-section-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;
    letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);
    margin:0 0 12px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .sess-section-sub{font-size:11px;letter-spacing:0.06em;text-transform:none;color:var(--faint);font-weight:400}
  .badge-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;
    margin-right:5px;animation:blink 1.2s infinite;vertical-align:middle}
  .session-list{display:flex;flex-direction:column;gap:12px}
  .empty{color:var(--faint);font-size:14px;text-align:center;padding:24px 0}
  .session-card{
    background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);
    border-radius:12px;padding:16px 18px;display:flex;align-items:center;
    justify-content:space-between;gap:16px;flex-wrap:wrap;transition:border-color .2s;
  }
  .session-card.live{border-color:var(--accent);background:rgba(82,48,218,0.12)}
  .session-card.finished{opacity:.5}
  .session-main{display:flex;flex-direction:column;gap:4px;min-width:0}
  .session-name{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500}
  .session-meta{font-size:13px;color:var(--muted)}
  .session-organizer{display:inline-flex;align-items:center;gap:6px;vertical-align:middle}
  .session-organizer .organizer-name{color:var(--white)}
  .sess-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;vertical-align:middle}
  .sess-avatar-initial{display:inline-flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent));font-family:'Montserrat',sans-serif;
    font-weight:600;font-size:10px;color:#fff}
  .organizer-note{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-top:4px}
  .organizer-note .sess-avatar{width:24px;height:24px;font-size:11px}
  .organizer-note .organizer-label{color:var(--faint)}
  .organizer-note b{color:var(--white);font-weight:600}
  .session-right{display:flex;align-items:center;gap:14px}
  .badge{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    padding:4px 9px;border-radius:20px;font-weight:600}
  .badge.upcoming{background:rgba(0,51,255,0.2);color:#9db4ff}
  .badge.live{background:var(--accent);color:var(--white)}
  .badge.finished{background:rgba(255,255,255,0.1);color:var(--muted)}
  .countdown{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;
    font-variant-numeric:tabular-nums;min-width:78px;text-align:right}
  .countdown.live{color:#3ddc84}
  .btn-join{
    font-family:'Inter',sans-serif;text-decoration:none;font-size:13px;font-weight:600;
    background:var(--accent);color:var(--white);padding:9px 18px;border-radius:8px;transition:background .2s;
  }
  .btn-join:hover{background:#6a47f0}
  .btn-secondary{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
    background:rgba(255,255,255,0.07);color:var(--white);border:1px solid var(--panel-border);
    padding:8px 16px;border-radius:8px;transition:background .2s}
  .btn-secondary:hover{background:rgba(255,255,255,0.13)}
  .btn-secondary:disabled{opacity:.5;cursor:default}

  /* Connection (invitation) page */
  .connect-card{max-width:560px;margin:8px auto;background:rgba(255,255,255,0.04);
    border:1px solid var(--panel-border);border-radius:16px;padding:32px 30px;text-align:center}
  .connect-avatar{width:96px;height:96px;border-radius:50%;overflow:hidden;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .connect-avatar img{width:100%;height:100%;object-fit:cover}
  .connect-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:38px;color:#fff}
  .connect-eyebrow{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
  .connect-title{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:500;margin-top:4px}
  .connect-bio{color:var(--muted);font-size:15px;margin-top:12px;line-height:1.55}
  .connect-lead{color:var(--muted);font-size:15px;margin-top:12px}
  .connect-what{text-align:left;margin-top:24px;padding-top:20px;border-top:1px solid var(--panel-border)}
  .connect-what h2{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;margin-bottom:8px}
  .connect-what p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:10px}
  .connect-control{color:var(--faint)}
  .connect-action{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .connect-note{color:var(--muted);font-size:14px}
  .connect-note.ok{color:#3ddc84}

  /* ---- Connect landing (Spiritual Maker mini page) ----------------------- */
  .cn-wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .cn-card{background:linear-gradient(160deg, rgba(255,255,255,0.05), rgba(82,48,218,0.06));
    border:1px solid var(--panel-border);border-radius:18px;padding:22px}
  .cn-h{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;letter-spacing:0.03em;margin-bottom:14px}

  .cn-hero{position:relative;overflow:hidden;text-align:center;
    background:linear-gradient(160deg, rgba(82,48,218,0.28), rgba(0,51,255,0.08));
    border:1px solid rgba(155,109,255,0.4);border-radius:22px;padding:32px 24px 26px}
  .cn-hero::before{content:'';position:absolute;inset:-40% -20% auto auto;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle, rgba(155,109,255,0.28), transparent 70%);pointer-events:none}
  .cn-hero-avatar{width:104px;height:104px;border-radius:50%;overflow:hidden;margin:0 auto 14px;position:relative;z-index:1;
    display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent));
    box-shadow:0 8px 30px -8px rgba(82,48,218,0.7)}
  .cn-hero-avatar img{width:100%;height:100%;object-fit:cover}
  .cn-hero-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:42px;color:#fff}
  .cn-badge{display:inline-block;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:600;
    color:#cdbcff;background:rgba(155,109,255,0.18);border:1px solid rgba(155,109,255,0.45);
    border-radius:99px;padding:4px 12px;position:relative;z-index:1}
  .cn-name{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:500;margin:10px 0 0;position:relative;z-index:1}
  .cn-intro{color:var(--muted);font-size:15px;line-height:1.55;margin:10px auto 0;max-width:440px;position:relative;z-index:1}
  .cn-socials{display:flex;gap:10px;justify-content:center;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
  .cn-social{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.08);border:1px solid var(--panel-border);color:#fff;transition:all .15s}
  .cn-social:hover{background:rgba(155,109,255,0.25);border-color:rgba(155,109,255,0.6);transform:translateY(-2px)}
  .cn-social svg{width:20px;height:20px;display:block}

  .cn-cta{display:inline-block;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;text-decoration:none;
    background:var(--accent);color:#fff;border:none;cursor:pointer;padding:13px 26px;border-radius:11px;
    box-shadow:0 10px 26px -8px rgba(82,48,218,0.75);transition:transform .15s, background .15s}
  .cn-cta:hover{background:#6a47f0;transform:translateY(-2px)}
  .cn-cta:disabled{opacity:.6;cursor:default;transform:none}
  .cn-cta-slot{margin-top:20px;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px}
  .cn-note{font-size:14px;color:var(--muted)}
  .cn-note.ok{color:#3ddc84}

  .cn-check{list-style:none;display:flex;flex-direction:column;gap:11px}
  .cn-check li{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--white);line-height:1.45}
  .cn-tick{color:#3ddc84;font-weight:700;flex-shrink:0}

  .cn-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .cn-stat{background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);border-radius:12px;padding:14px 8px;text-align:center}
  .cn-stat-val{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:600;line-height:1.1;font-variant-numeric:tabular-nums}
  .cn-stat-lbl{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-top:6px}

  .cn-sessions{display:flex;flex-direction:column;gap:10px}
  .cn-session{display:flex;align-items:center;justify-content:space-between;gap:12px;text-decoration:none;color:inherit;
    background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);border-radius:12px;padding:14px 16px;transition:all .15s}
  .cn-session:hover{border-color:rgba(155,109,255,0.5);transform:translateY(-1px)}
  .cn-session-name{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:500}
  .cn-session-meta{font-size:12px;color:var(--muted);margin-top:3px}
  .cn-session-cta{font-size:13px;color:#cdbcff;font-weight:600;flex-shrink:0}

  .cn-offer-body{display:flex;gap:18px;align-items:flex-start}
  .cn-offer-img{width:130px;height:130px;border-radius:14px;object-fit:cover;flex-shrink:0;background:rgba(0,0,0,0.25)}
  .cn-offer-img-ph{display:flex;align-items:center;justify-content:center;color:var(--faint);
    font-family:'Montserrat',sans-serif;font-size:12px;line-height:1.4;text-align:center;border:1px dashed var(--panel-border)}
  .cn-offer-info{flex:1;min-width:0}
  .cn-offer-name{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;margin-bottom:10px}
  .cn-offer-feats{margin-bottom:12px}
  .cn-price{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
  .cn-price-reg{font-size:13px;color:var(--muted)}
  .cn-price-your{font-size:15px}
  .cn-price-your b{font-family:'Montserrat',sans-serif;font-size:20px;color:#3ddc84}
  .cn-coupon{font-size:13px;color:var(--muted);margin-bottom:14px}
  .cn-coupon-code{font-family:'Montserrat',sans-serif;font-weight:600;color:#ffd479;letter-spacing:0.06em;
    background:rgba(255,212,121,0.12);border:1px dashed rgba(255,212,121,0.5);border-radius:6px;padding:2px 8px}
  .cn-offer-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  .cn-final{text-align:center;padding:8px 0 6px}
  .cn-final-h{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:500;margin-bottom:2px}

  .cn-modal-backdrop{position:fixed;inset:0;z-index:1200;display:flex;align-items:center;justify-content:center;padding:18px;
    background:rgba(8,5,30,0.72);backdrop-filter:blur(6px);opacity:0;transition:opacity .18s}
  .cn-modal-backdrop.open{opacity:1}
  .cn-modal{width:100%;max-width:400px;text-align:center;
    background:linear-gradient(160deg, rgba(82,48,218,0.32), rgba(13,11,40,0.96));
    border:1px solid rgba(155,109,255,0.45);border-radius:18px;padding:26px 22px;
    box-shadow:0 24px 60px -16px rgba(0,0,0,0.7);transform:translateY(10px);transition:transform .2s}
  .cn-modal-backdrop.open .cn-modal{transform:translateY(0)}
  .cn-modal-avatar{width:64px;height:64px;border-radius:50%;overflow:hidden;margin:0 auto 12px;
    display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent))}
  .cn-modal-avatar img{width:100%;height:100%;object-fit:cover}
  .cn-modal-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:26px;color:#fff}
  .cn-modal-title{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:500}
  .cn-modal-text{font-size:14px;color:var(--muted);line-height:1.55;margin:10px 0 18px}
  .cn-modal-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .cn-modal-actions .cn-cta,.cn-modal-actions .btn-secondary{padding:11px 22px}

  @media (max-width:600px){
    .cn-stats{grid-template-columns:repeat(2,minmax(0,1fr))}
    .cn-offer-body{flex-direction:column;align-items:center;text-align:center}
    .cn-offer-img{width:100%;height:auto;aspect-ratio:1/1;max-width:200px}
    .cn-offer-feats{text-align:left}
    .cn-offer-actions{justify-content:center}
    .cn-name{font-size:26px}
  }

  /* ---- Experiments ------------------------------------------------------- */
  .xp-cover{position:relative;overflow:hidden;border-radius:12px;flex-shrink:0;
    background:linear-gradient(140deg, rgba(82,48,218,0.55), rgba(0,51,255,0.25));
    display:flex;align-items:center;justify-content:center}
  .xp-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .xp-cover-icon{font-size:26px;position:relative;z-index:1;opacity:.92}

  .xp-hero{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    background:linear-gradient(160deg, rgba(82,48,218,0.28), rgba(0,51,255,0.08));
    border:1px solid rgba(155,109,255,0.4);border-radius:18px;padding:16px 18px;margin-bottom:8px;
    transition:transform .15s, border-color .15s}
  .xp-hero:hover{transform:translateY(-2px);border-color:rgba(155,109,255,0.7)}
  .xp-hero-cover{width:76px;height:76px}.xp-hero-cover .xp-cover-icon{font-size:34px}
  .xp-hero-info{flex:1;min-width:0}
  .xp-hero-eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#cdbcff}
  .xp-hero-title{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:500;margin-top:2px}
  .xp-hero-meta{font-size:13px;color:var(--muted);margin-top:2px}
  .xp-hero-cta{font-size:14px;font-weight:600;color:#cdbcff;flex-shrink:0;white-space:nowrap}

  .xp-section-h{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;
    letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:22px 0 12px}

  .xp-topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .xp-topic{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);border-radius:14px;padding:14px;
    transition:transform .15s, border-color .15s}
  a.xp-topic:hover{transform:translateY(-2px);border-color:rgba(155,109,255,0.5)}
  .xp-topic.is-empty{opacity:.5}
  .xp-topic-cover{width:54px;height:54px}
  .xp-topic-info{flex:1;min-width:0}
  .xp-topic-title{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500}
  .xp-topic-count{font-size:12px;color:var(--muted);margin-top:3px}

  .xp-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;margin-top:8px}
  .xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#5230da,#b18bff)}

  .xp-exps{display:flex;flex-direction:column;gap:12px}
  .xp-exp{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    background:linear-gradient(160deg, rgba(255,255,255,0.05), rgba(82,48,218,0.06));
    border:1px solid var(--panel-border);border-radius:16px;padding:16px;transition:transform .15s, border-color .15s}
  .xp-exp:hover{transform:translateY(-2px);border-color:rgba(155,109,255,0.5)}
  .xp-exp-cover{width:64px;height:64px}.xp-exp-cover .xp-cover-icon{font-size:30px}
  .xp-exp-info{flex:1;min-width:0}
  .xp-exp-title{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:500}
  .xp-exp-sum{font-size:13px;color:var(--muted);margin:3px 0 7px;line-height:1.45}
  .xp-status{display:inline-block;font-size:11px;letter-spacing:0.04em;color:var(--faint);
    text-transform:uppercase;font-weight:600}
  .xp-status.going{color:#cdbcff}
  .xp-status.done{color:#3ddc84}
  .xp-exp-cta{font-size:14px;font-weight:600;color:#cdbcff;flex-shrink:0;white-space:nowrap}

  .xp-day-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .xp-day-dot{width:38px;height:38px;border-radius:10px;border:1px solid var(--panel-border);
    background:rgba(255,255,255,0.04);color:var(--muted);font-family:'Montserrat',sans-serif;
    font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;padding:0}
  .xp-day-dot.open:hover{border-color:rgba(155,109,255,0.5);color:#fff}
  .xp-day-dot.current{border-color:#ffd479;color:#ffd479;box-shadow:0 0 0 1px rgba(255,212,121,0.4)}
  .xp-day-dot.done{background:rgba(61,220,132,0.14);border-color:rgba(61,220,132,0.5);color:#3ddc84}
  .xp-day-dot.locked{opacity:.4;cursor:not-allowed}

  .xp-day-eyebrow{font-family:'Montserrat',sans-serif;font-size:12px;letter-spacing:0.12em;
    text-transform:uppercase;color:#cdbcff;margin-bottom:10px}
  .xp-day-text{font-size:15px;line-height:1.6;color:var(--white);margin-bottom:14px}
  .xp-day-block{margin-bottom:12px}
  .xp-day-label{display:inline-block;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--faint);margin-bottom:4px}
  .xp-day-block p{font-size:14px;line-height:1.55;color:var(--muted)}

  .xp-done-note{margin-top:8px;padding:14px 16px;border-radius:12px;text-align:center;
    background:rgba(61,220,132,0.1);border:1px solid rgba(61,220,132,0.35);color:#3ddc84;font-size:14px}
  .xp-done-card{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px;
    padding:14px 16px;border-radius:12px;text-decoration:none;color:inherit;
    background:rgba(61,220,132,0.1);border:1px solid rgba(61,220,132,0.35);transition:transform .15s,border-color .15s}
  .xp-done-card:hover{border-color:rgba(61,220,132,0.65);transform:translateY(-1px)}
  .xp-done-main{font-size:14px;color:#3ddc84;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .xp-done-main b{font-family:'Montserrat',sans-serif;font-size:18px}
  .xp-done-cta{font-size:13px;color:#cdbcff;font-weight:600;flex-shrink:0;white-space:nowrap}

  .xp-measure{margin-top:16px;padding:16px;border-radius:14px;text-align:center;
    background:rgba(82,48,218,0.12);border:1px solid rgba(155,109,255,0.35)}
  .xp-measure-head{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;margin-bottom:12px}
  .xp-measure-hint{font-size:13px;color:var(--muted);margin:4px 0}
  .xp-live-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
  .xp-live-cell{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 6px}
  .xp-live-val{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .xp-live-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .xp-verify{font-size:12px;font-weight:600;margin-bottom:12px}
  .xp-verify.good{color:#3ddc84}
  .xp-verify.bad{color:#e0a23c}
  .xp-review-row{display:flex;gap:18px;justify-content:center;align-items:center;font-size:13px;color:var(--muted);margin-bottom:6px;flex-wrap:wrap}
  .xp-review-row b{font-family:'Montserrat',sans-serif;font-size:20px}
  .xp-review-level{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:600}

  /* Experiment rating (shown only when the whole experiment is complete) */
  .xp-rating{text-align:center}
  .xp-rating-q{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:500;margin-bottom:10px}
  .xp-stars{display:inline-flex;gap:4px}
  .xp-star{background:none;border:none;cursor:pointer;font-size:30px;line-height:1;padding:2px 4px;
    color:rgba(255,255,255,0.22);transition:color .12s, transform .12s}
  .xp-star:hover{transform:scale(1.15)}
  .xp-star.on{color:#ffd479}
  .xp-rating-thanks{font-size:14px;color:#3ddc84}

  /* Profile: connection link + following list */
  .link-row{display:flex;gap:10px;align-items:center}
  .link-input{flex:1;font-size:13px;color:var(--muted)}
  .following-list{display:flex;flex-direction:column;gap:10px}
  .following-row{display:flex;align-items:center;gap:12px}
  .following-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .following-avatar img{width:100%;height:100%;object-fit:cover}
  .following-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:15px;color:#fff}
  .following-name{flex:1;font-size:15px}

  /* Room view */
  .room-head{margin-bottom:8px}
  .room-title-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .room-title{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:500}
  .live-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;
    letter-spacing:0.1em;text-transform:uppercase;background:var(--accent);padding:5px 12px;border-radius:20px}
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.3}}
  .room-sub{color:var(--muted);font-size:14px;margin-top:2px}
  .name-gate{margin-top:18px}
  .room-hint{color:var(--muted);font-size:13px;margin-top:14px;text-align:center}
  .link{color:#9db4ff;text-decoration:none}
  .link:hover{text-decoration:underline}

  .leader-banner{display:flex;flex-direction:column;margin:18px 0;
    background:linear-gradient(120deg, rgba(82,48,218,0.35), rgba(0,51,255,0.16));
    border:1px solid rgba(82,48,218,0.6);border-radius:14px;padding:16px 20px}
  .lb-top{display:flex;align-items:center;gap:16px}
  .avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Montserrat',sans-serif;font-weight:600;font-size:16px;color:#fff;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .avatar.lg{width:52px;height:52px;font-size:20px}
  .lb-info{flex-shrink:0;min-width:0}
  .lb-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
  .lb-name{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-name.waiting{color:var(--muted);font-style:italic}
  .lb-spark{flex:1;min-width:80px;height:40px;display:block;background:rgba(0,0,0,0.18);border-radius:6px}
  .lb-metrics{display:flex;gap:18px;flex-shrink:0;text-align:center}
  .lb-expand{background:rgba(255,255,255,0.08);border:1px solid var(--panel-border);
    color:var(--white);width:36px;height:36px;border-radius:9px;font-size:13px;cursor:pointer;
    flex-shrink:0;transition:transform .25s, background .2s;padding:0;display:flex;align-items:center;justify-content:center}
  .lb-expand:hover{background:rgba(255,255,255,0.16)}
  .lb-expand.open{transform:rotate(180deg)}
  .lb-chart-wrap{margin-top:14px}
  .lb-chart{width:100%;height:170px;display:block;background:rgba(0,0,0,0.22);border-radius:8px}

  /* minmax(0,1fr) (not 1fr) lets each column shrink below its content width, so
     a long value like the countdown can never push the grid past the viewport. */
  .group-bar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:18px 0}
  .gstat{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:14px 16px;text-align:center;min-width:0}
  .gstat.time{background:rgba(82,48,218,0.14);border-color:rgba(82,48,218,0.5)}
  .gval{font-family:'Montserrat',sans-serif;font-size:clamp(22px,6.5vw,32px);font-weight:600;line-height:1.1;font-variant-numeric:tabular-nums;overflow-wrap:anywhere}
  .glbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:7px}

  .scale{margin:18px 0 22px}
  .scale-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .scale-bar{height:12px;border-radius:6px;
    background:linear-gradient(90deg,var(--red) 0%,var(--red) 21%,var(--yellow) 25%,var(--yellow) 50%,var(--green) 54%,var(--green) 100%)}
  .scale-ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);font-family:'Montserrat',sans-serif;margin-top:5px}

  .board{display:flex;flex-direction:column;gap:12px}
  .racer{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;
    padding:14px 18px;display:flex;align-items:center;gap:16px;transition:transform .35s ease, border-color .3s}
  .rank{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;color:var(--faint);width:24px;text-align:center;flex-shrink:0}
  .racer-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
  .racer-name-row{display:flex;align-items:center;gap:8px;min-width:0}
  .racer-name{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .host-tag{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;
    background:rgba(82,48,218,0.3);border:1px solid rgba(82,48,218,0.6);color:#cdbcff;padding:2px 7px;border-radius:20px;flex-shrink:0}
  .spark{width:100%;height:32px;display:block;background:rgba(0,0,0,0.18);border-radius:5px}
  .metrics{display:flex;align-items:flex-start;gap:16px;flex-shrink:0;text-align:center}
  .metric{display:flex;flex-direction:column;align-items:center;min-width:42px}
  .metric-val{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums;transition:color .2s}
  .metric-val.avg{color:var(--white)}
  .metric-lbl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:6px}

  /* Results screen */
  .res-group{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:20px;text-align:center;margin:18px 0}
  .res-group-val{font-family:'Montserrat',sans-serif;font-size:48px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .res-group-lbl{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:8px}
  .res-h{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;margin:24px 0 12px}
  .res-h-sub{color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-size:12px;margin-left:6px}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .cat-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:16px}
  .cat-icon{width:26px;height:26px;color:var(--accent);margin-bottom:10px}
  .cat-icon svg{width:100%;height:100%;display:block}
  .cat-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600}
  .cat-desc{font-size:11px;color:var(--muted);margin:3px 0 10px;line-height:1.4}
  .cat-winner{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:500;color:var(--white);border-top:1px solid var(--panel-border);padding-top:9px}
  .res-list{display:flex;flex-direction:column;gap:12px}
  .res-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:16px}
  .res-rank{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;color:var(--faint);width:24px;text-align:center;flex-shrink:0}
  .res-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .res-curve{width:100%;height:34px;display:block;background:rgba(0,0,0,0.18);border-radius:5px}
  .zonebar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.06)}
  .zonebar span{display:block;height:100%}
  .z-red{background:var(--red)} .z-yellow{background:var(--yellow)} .z-green{background:var(--green)}
  .res-stats{display:flex;gap:14px;flex-shrink:0;text-align:center}
  .rs{display:flex;flex-direction:column;align-items:center;min-width:40px}
  .rs-val{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .rs-trend{font-size:13px}
  .rs-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .metric-legend{margin-top:18px;padding:16px;background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;font-size:12px;color:var(--muted);line-height:1.7}
  .metric-legend b{color:var(--white)}

  /* Verified / cheat-detection markers */
  .v-badge{flex-shrink:0}
  .v-badge.verified{color:#3ddc84;font-size:13px;font-weight:700}
  .v-badge.unverified{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
    color:#e0a23c;border:1px solid rgba(224,162,60,0.5);border-radius:20px;padding:2px 7px}
  .warn{color:#e0a23c}
  .check-field .check{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--white);
    text-transform:none;letter-spacing:0;cursor:pointer}
  .check-field .check input{width:16px;height:16px;accent-color:var(--accent)}
  .sess-verified{margin-left:9px;font-size:10px;font-weight:600;letter-spacing:0.08em;color:#3ddc84;
    border:1px solid rgba(61,220,132,0.4);border-radius:20px;padding:2px 7px;vertical-align:middle}
  .session-avg{font-size:13px;color:var(--muted);white-space:nowrap}
  .session-avg b{font-family:'Montserrat',sans-serif;color:var(--white);font-weight:600}

  /* Level-up celebration banner */
  .level-up-banner{
    margin-bottom:18px;padding:20px 24px;border-radius:16px;
    background:linear-gradient(135deg, #ffd479, #f5a623);color:#1a0e3a;
    display:flex;align-items:center;gap:18px;justify-content:center;text-align:center;
    box-shadow:0 12px 44px -14px rgba(255,180,80,0.75);
    animation:level-up-pop .55s ease-out;
  }
  .lub-sparkle{font-size:32px;line-height:1;animation:lub-sparkle 1.6s ease-in-out infinite}
  .lub-eyebrow{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.22em;
    text-transform:uppercase;opacity:0.78}
  .lub-title{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:500;margin-top:2px;line-height:1.2}
  @keyframes level-up-pop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes lub-sparkle{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.18);opacity:1}}

  /* Header level pill (next to user identity) */
  .header-level{display:inline-flex;align-items:center;gap:6px;
    background:linear-gradient(135deg, rgba(82,48,218,0.35), rgba(155,109,255,0.35));
    border:1px solid rgba(155,109,255,0.5);border-radius:99px;padding:5px 11px;
    text-decoration:none;color:inherit;font-size:11px;letter-spacing:0.04em;
    transition:border-color .2s,transform .2s}
  .header-level:hover{border-color:rgba(155,109,255,0.85);transform:translateY(-1px)}
  .header-level.lv-5{border-color:rgba(255,212,121,0.55)}
  .header-level.lv-6{background:linear-gradient(135deg, rgba(255,212,121,0.4), rgba(245,166,35,0.35));
    border-color:rgba(255,212,121,0.75)}
  .hl-num{font-family:'Montserrat',sans-serif;font-weight:600}
  .hl-name{font-family:'Inter',sans-serif;opacity:.9}

  /* Home Dashboard — Level Journey (compact 3-col with full progression path) */
  .level-journey{
    position:relative;overflow:hidden;margin-bottom:18px;padding:16px 22px;
    border-radius:16px;border:1px solid rgba(155,109,255,0.32);
    background:linear-gradient(135deg, rgba(82,48,218,0.22), rgba(0,51,255,0.06));
    display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;
    min-height:108px
  }
  .level-journey::before{content:'';position:absolute;inset:-30% -10% auto auto;
    width:260px;height:260px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(155,109,255,0.22), transparent 70%)}
  .level-journey.level-tier-5{border-color:rgba(255,212,121,0.4)}
  .level-journey.level-tier-6{border-color:rgba(255,212,121,0.6);
    background:linear-gradient(135deg, rgba(255,180,80,0.22), rgba(82,48,218,0.12))}
  .level-journey.level-tier-6::before{background:radial-gradient(circle, rgba(255,212,121,0.32), transparent 70%)}

  .lj-side{display:flex;flex-direction:column;gap:3px;min-width:0;position:relative;z-index:1}
  .lj-right{text-align:right;align-items:flex-end}
  .lj-eyebrow{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.2em;
    text-transform:uppercase;color:rgba(255,255,255,0.55)}
  .lj-title{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:500;line-height:1.05;margin:0}
  .lj-title-sm{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;line-height:1.05}
  .lj-meta{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;line-height:1.4}
  .lj-to-next{color:#cdbcff}
  .lj-max{color:#ffd479}
  .lj-total{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.08);
    color:var(--faint);font-size:11px;letter-spacing:0.04em}
  .level-journey.level-tier-6 .lj-to-next{color:#ffd479}

  .lj-track{position:relative;padding:14px 14px 26px;width:100%;z-index:1}
  .lj-bar{height:8px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;position:relative}
  .lj-bar-fill{height:100%;border-radius:99px;
    background:linear-gradient(90deg, #5230da, #b18bff);
    box-shadow:0 0 14px rgba(155,109,255,0.6);
    transition:width .6s ease}
  .level-journey.level-tier-5 .lj-bar-fill,
  .level-journey.level-tier-6 .lj-bar-fill{
    background:linear-gradient(90deg, #ffd479, #f5a623);
    box-shadow:0 0 14px rgba(255,212,121,0.7)}

  .lj-marker{position:absolute;top:14px}
  .lj-dot{width:10px;height:10px;border-radius:50%;
    background:rgba(255,255,255,0.18);border:2px solid rgba(13,11,40,0.85);
    transform:translate(-50%,-1px);transition:all .3s ease;position:relative;z-index:2}
  .lj-marker.reached .lj-dot{background:#b18bff;box-shadow:0 0 8px rgba(177,139,255,0.7)}
  .lj-marker.current .lj-dot{
    background:#ffd479;border-color:#fff;width:14px;height:14px;
    transform:translate(-50%,-3px);
    box-shadow:0 0 16px rgba(255,212,121,0.9), 0 0 36px rgba(255,212,121,0.4)}
  .lj-label{position:absolute;top:20px;transform:translateX(-50%);
    font-size:10px;letter-spacing:0.04em;color:var(--faint);white-space:nowrap}
  .lj-marker.reached .lj-label{color:rgba(255,255,255,0.7)}
  .lj-marker.current .lj-label{color:#ffd479;font-weight:600}
  /* Anchor the first and last labels to the bar edges so they don't overlap
     the left/right info columns. */
  .lj-marker:first-child .lj-label{transform:translateX(0)}
  .lj-marker:last-child .lj-label{transform:translateX(-100%)}

  /* Home Dashboard */
  .dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:8px}
  .dash-stat{background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);
    border-radius:12px;padding:14px 16px}
  .dash-stat-val{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:500;line-height:1;font-variant-numeric:tabular-nums}
  .dash-stat-lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:7px}

  .dash-h{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;
    margin:28px 0 14px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .dash-h-sub{font-size:12px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400}
  .dash-empty{color:var(--muted);font-size:14px;background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-border);border-radius:12px;padding:16px;text-align:center}

  /* Home — Upcoming Sessions teaser */
  .home-sess{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
  .home-sess-card{display:flex;flex-direction:column;gap:4px;
    padding:14px 18px;border-radius:12px;text-decoration:none;color:inherit;
    background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);
    transition:background .15s,border-color .15s,transform .15s}
  .home-sess-card:hover{background:rgba(255,255,255,0.07);
    border-color:rgba(155,109,255,0.45);transform:translateY(-1px)}
  .home-sess-card.live{border-color:rgba(82,48,218,0.55);
    background:linear-gradient(135deg, rgba(82,48,218,0.16), rgba(0,51,255,0.05))}
  .hs-row{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .hs-name{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:500;min-width:0}
  .hs-action{font-size:12px;color:#cdbcff;letter-spacing:0.06em;font-weight:600;flex-shrink:0}
  .hs-meta{font-size:12px;color:var(--muted)}
  .hs-live{color:#cdbcff;font-weight:600;letter-spacing:0.04em}

  /* Home — Continue Experiment block */
  .home-continue{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    background:linear-gradient(160deg, rgba(82,48,218,0.22), rgba(0,51,255,0.06));
    border:1px solid rgba(155,109,255,0.4);border-radius:14px;padding:14px 16px;margin:8px 0;
    transition:transform .15s,border-color .15s}
  .home-continue:hover{transform:translateY(-1px);border-color:rgba(155,109,255,0.65)}
  .hc-icon{font-size:30px;line-height:1;flex-shrink:0}
  .hc-info{flex:1;min-width:0}
  .hc-eyebrow{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#cdbcff}
  .hc-title{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hc-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .hc-cta{font-size:13px;color:#cdbcff;font-weight:600;flex-shrink:0;white-space:nowrap}

  .dash-next{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .dash-milestone{background:linear-gradient(135deg, rgba(82,48,218,0.18), rgba(0,51,255,0.06));
    border:1px solid var(--panel-border);border-radius:12px;padding:14px 16px}
  .dash-milestone.tier-gold{border-color:rgba(255,212,121,0.35)}
  .dash-milestone.tier-special{border-color:rgba(155,109,255,0.4)}
  .dm-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .dm-icon{font-size:22px;line-height:1}
  .dm-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500}
  .dm-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;margin-bottom:6px}
  .dm-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
  .tier-bronze  .dm-bar-fill{background:#cd7f32}
  .tier-silver  .dm-bar-fill{background:#c9d1d9}
  .tier-gold    .dm-bar-fill{background:#ffd479}
  .tier-special .dm-bar-fill{background:linear-gradient(90deg,#5230da,#b18bff)}
  .dm-progress{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

  .dash-cat{margin-top:22px}
  .dash-cat-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .dash-cat-title{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
  .dash-cat-count{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
  .dash-badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .dash-badge{background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);
    border-radius:12px;padding:16px 12px;text-align:center;transition:transform .2s ease,border-color .2s ease}
  .dash-badge.unlocked{background:linear-gradient(160deg, rgba(255,255,255,0.06), rgba(82,48,218,0.06))}
  .dash-badge.unlocked.tier-bronze {border-color:rgba(205,127,50,0.55)}
  .dash-badge.unlocked.tier-silver {border-color:rgba(201,209,217,0.55)}
  .dash-badge.unlocked.tier-gold   {border-color:rgba(255,212,121,0.65);
    box-shadow:0 4px 24px -10px rgba(255,212,121,0.45)}
  .dash-badge.unlocked.tier-special{border-color:rgba(155,109,255,0.65);
    box-shadow:0 4px 28px -10px rgba(155,109,255,0.55)}
  .dash-badge.locked{opacity:0.45}
  .dash-badge.locked .db-icon{filter:grayscale(1)}
  .db-icon{font-size:34px;line-height:1;margin-bottom:8px}
  .db-title{font-size:13px;font-weight:500;line-height:1.3;min-height:34px}
  .db-status{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:0.04em}
  .db-status.unlocked{color:#3ddc84}
  .dash-badge{position:relative}
  .dash-badge.unlocked:hover{transform:translateY(-2px)}

  /* Global Ranking — Leaderboard */
  .lb-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .lb-tab{padding:8px 16px;border-radius:99px;background:transparent;
    border:1px solid var(--panel-border);color:var(--muted);cursor:pointer;
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
    transition:background .2s,color .2s,border-color .2s}
  .lb-tab:hover{color:#fff;border-color:rgba(155,109,255,0.5)}
  .lb-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* Community heartbeat — subtle line of who's on the journey */
  .lb-heartbeat{font-size:12px;color:var(--muted);letter-spacing:0.04em;
    margin:14px 2px 18px;font-family:'Inter',sans-serif}

  /* "Earned XP this week" pulse — shown on This Month + All Time only */
  .lb-active-dot{display:inline-block;width:8px;height:8px;border-radius:50%;
    background:#3ddc84;box-shadow:0 0 8px rgba(61,220,132,0.65);
    margin-left:6px;vertical-align:middle;animation:lb-active-pulse 2.4s ease-in-out infinite}
  @keyframes lb-active-pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

  .lb-podium{display:grid;grid-template-columns:1fr 1.25fr 1fr;gap:14px;align-items:end;margin-bottom:18px}
  .lb-podium-card{position:relative;text-align:center;border-radius:14px;padding:18px 14px;
    background:linear-gradient(160deg, rgba(255,255,255,0.05), rgba(82,48,218,0.08));
    border:1px solid var(--panel-border)}
  .lb-podium-card.place-1{order:2;padding:22px 14px;
    background:linear-gradient(160deg, rgba(255,212,121,0.2), rgba(82,48,218,0.1));
    border-color:rgba(255,212,121,0.55);
    box-shadow:0 10px 36px -14px rgba(255,212,121,0.5)}
  .lb-podium-card.place-2{order:1;
    background:linear-gradient(160deg, rgba(201,209,217,0.14), rgba(82,48,218,0.06));
    border-color:rgba(201,209,217,0.45)}
  .lb-podium-card.place-3{order:3;
    background:linear-gradient(160deg, rgba(205,127,50,0.16), rgba(82,48,218,0.06));
    border-color:rgba(205,127,50,0.45)}
  .lb-medal{font-size:30px;line-height:1;margin-bottom:6px}
  .lb-podium-card.place-1 .lb-medal{font-size:36px}

  .lb-avatar{border-radius:50%;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .lb-avatar img{width:100%;height:100%;object-fit:cover}
  .lb-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;color:#fff}
  .lb-avatar.sm{width:32px;height:32px}
  .lb-avatar.sm .avatar-initial{font-size:13px}
  .lb-avatar.md{width:44px;height:44px}
  .lb-avatar.md .avatar-initial{font-size:17px}
  .lb-avatar.lg{width:54px;height:54px;margin:0 auto 10px}
  .lb-avatar.lg .avatar-initial{font-size:22px}
  .lb-podium-card.place-1 .lb-avatar.lg{width:64px;height:64px}
  .lb-podium-card.place-1 .lb-avatar.lg .avatar-initial{font-size:26px}

  .lb-name{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-podium-card .lb-name{font-size:16px;margin-top:4px}
  .lb-podium-card.place-1 .lb-name{font-size:18px}
  .lb-level{margin-top:6px}
  .lb-podium-card .lb-xp{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;margin-top:8px}
  .lb-podium-card.place-1 .lb-xp{font-size:22px}
  .lb-podium-card .lb-rare{margin-top:8px;display:flex;gap:6px;justify-content:center;min-height:18px}
  .lb-rare-icon{display:inline-block;font-size:16px;line-height:1}
  .lb-xp-label{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--muted);font-weight:400;margin-left:3px}

  .lb-level-pill{display:inline-flex;align-items:center;gap:4px;
    background:rgba(155,109,255,0.22);border:1px solid rgba(155,109,255,0.4);
    border-radius:99px;padding:2px 9px;font-size:10px;letter-spacing:0.04em;
    font-family:'Inter',sans-serif;color:#cdbcff}
  .lb-level-pill.lv-5,.lb-level-pill.lv-6{background:rgba(255,212,121,0.22);
    border-color:rgba(255,212,121,0.5);color:#ffd479}

  /* Your standing card */
  .lb-mine{margin-bottom:18px;padding:14px 18px;border-radius:14px;
    background:linear-gradient(135deg, rgba(82,48,218,0.2), rgba(0,51,255,0.06));
    border:1px solid rgba(155,109,255,0.45);
    display:flex;flex-direction:column;gap:10px}
  .lb-mine.empty{align-items:center;text-align:center;padding:18px}
  .lb-mine-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
  .lb-mine-row{display:flex;align-items:center;gap:14px}
  .lb-mine-id{flex:1;min-width:0}
  .lb-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .lb-mine-rank{text-align:right;flex-shrink:0}
  .lb-rank-num{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:500;line-height:1}
  .lb-rank-meta{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:0.08em}
  .lb-mine-copy{font-size:13px;color:#cdbcff}
  .lb-mine-msg{font-size:14px;color:var(--muted)}

  /* List rows */
  .lb-list{display:flex;flex-direction:column;gap:8px}
  .lb-row{display:flex;align-items:center;gap:14px;cursor:pointer;
    background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);
    border-radius:12px;padding:10px 14px;transition:transform .15s,border-color .15s,background .15s}
  .lb-row:hover{transform:translateY(-1px);border-color:rgba(155,109,255,0.45);background:rgba(255,255,255,0.05)}
  .lb-row.mine{border-color:rgba(155,109,255,0.55);
    background:linear-gradient(135deg, rgba(82,48,218,0.14), rgba(0,51,255,0.04));
    box-shadow:0 4px 18px -10px rgba(155,109,255,0.5)}
  .lb-row-rank{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;
    color:var(--muted);min-width:34px;text-align:center;font-variant-numeric:tabular-nums}
  .lb-row-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
  .lb-name-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
  .lb-name-line .lb-name{min-width:0;flex-shrink:1}
  .lb-meta-line{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .lb-status{color:#cdbcff}
  .lb-pract-tag{font-size:9px;letter-spacing:0.1em;padding:2px 7px;border-radius:99px;
    background:rgba(61,220,132,0.18);color:#3ddc84;border:1px solid rgba(61,220,132,0.4);
    text-transform:uppercase;font-weight:600;flex-shrink:0}
  .lb-pract-pin{display:inline-block;margin-left:4px;color:#3ddc84;font-weight:700}
  .lb-row-rare{display:flex;gap:4px;flex-shrink:0;align-items:center}
  .lb-row-xp{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500;
    flex-shrink:0;font-variant-numeric:tabular-nums}

  /* Podium cards also clickable */
  .lb-podium-card{cursor:pointer;transition:transform .2s,box-shadow .2s}
  .lb-podium-card:hover{transform:translateY(-2px)}
  .lb-podium-status{font-size:11px;color:#cdbcff;margin-top:4px}

  /* Your-standing card also clickable */
  .lb-mine[data-user-id]{cursor:pointer;transition:transform .15s}
  .lb-mine[data-user-id]:hover{transform:translateY(-1px)}

  .lb-empty{text-align:center;padding:40px 18px;color:var(--muted);
    background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);
    border-radius:14px}

  /* ---- Mini-profile popup ------------------------------------------------ */
  .lb-modal-backdrop{position:fixed;inset:0;z-index:1000;
    background:rgba(8,5,30,0.7);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;padding:18px;
    opacity:0;transition:opacity .18s ease}
  .lb-modal-backdrop.open{opacity:1}
  .lb-modal{
    width:100%;max-width:440px;max-height:90vh;overflow:auto;position:relative;
    background:linear-gradient(160deg, rgba(82,48,218,0.32), rgba(13,11,40,0.95));
    border:1px solid rgba(155,109,255,0.45);border-radius:18px;padding:24px 22px;
    box-shadow:0 24px 60px -16px rgba(82,48,218,0.55);
    transform:translateY(8px);transition:transform .22s ease;
    color:#fff
  }
  .lb-modal-backdrop.open .lb-modal{transform:translateY(0)}
  .lb-modal-close{position:absolute;top:10px;right:12px;
    width:32px;height:32px;border-radius:50%;cursor:pointer;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
    color:#fff;font-size:18px;line-height:1;padding:0;
    display:flex;align-items:center;justify-content:center}
  .lb-modal-close:hover{background:rgba(255,255,255,0.16)}
  .lb-modal-head{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
  .lb-avatar.xl{width:90px;height:90px}
  .lb-avatar.xl .avatar-initial{font-size:36px}
  .lb-modal-name{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:500;margin-top:8px}
  .lb-modal-pract{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
    color:#3ddc84;background:rgba(61,220,132,0.12);
    border:1px solid rgba(61,220,132,0.35);
    padding:3px 10px;border-radius:99px}
  .lb-modal-status{font-size:13px;color:#cdbcff;margin-top:2px}
  .lb-modal-level{display:flex;align-items:baseline;justify-content:center;gap:10px;
    margin:14px 0;padding:12px;border-radius:12px;
    background:rgba(155,109,255,0.12);border:1px solid rgba(155,109,255,0.35)}
  .lb-modal-level-eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
  .lb-modal-level-title{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500}
  .lb-modal-rare{display:flex;gap:8px;justify-content:center;font-size:22px;margin-bottom:14px;
    flex-wrap:wrap;min-height:24px}
  .lb-modal-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .lbm-stat{background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);
    border-radius:10px;padding:10px 12px;text-align:center}
  .lbm-val{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:500;
    line-height:1;font-variant-numeric:tabular-nums}
  .lbm-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--muted);margin-top:5px}

  @media (max-width:520px){
    .lb-modal{padding:20px 16px;max-height:95vh}
    .lb-modal-stats{grid-template-columns:repeat(2,1fr)}
    .lb-avatar.xl{width:76px;height:76px}
    .lb-avatar.xl .avatar-initial{font-size:30px}
    .lb-modal-name{font-size:20px}
  }

  /* Info "i" button — taps on mobile (and clicks on desktop) reveal a description */
  .db-info{position:absolute;top:8px;left:8px;
    width:20px;height:20px;border-radius:50%;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
    color:rgba(255,255,255,0.7);
    font-family:'Inter',sans-serif;font-size:11px;font-weight:700;font-style:italic;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    padding:0;line-height:1;
    transition:background .15s ease,color .15s ease,border-color .15s ease;
    z-index:2}
  .db-info:hover{background:rgba(255,255,255,0.16);color:#fff;border-color:rgba(255,255,255,0.3)}
  .db-desc{display:none;font-size:11px;color:var(--muted);line-height:1.45;
    margin-top:8px;padding-top:8px;border-top:1px solid var(--panel-border);text-align:left}
  .dash-badge.expanded .db-desc,
  .dash-recent-card.expanded .db-desc{display:block}
  .db-desc-text{margin:0 0 6px}
  .db-desc-meta{font-size:10px;letter-spacing:0.04em;color:var(--faint);
    display:flex;flex-wrap:wrap;gap:6px}
  .db-desc-xp{color:#cdbcff;font-weight:600}
  .dash-badge.unlocked .db-desc-xp,
  .dash-recent-card .db-desc-xp{color:#3ddc84}

  /* Recent achievements strip */
  .dash-recent{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .dash-recent-card{position:relative;background:linear-gradient(160deg, rgba(255,255,255,0.05), rgba(82,48,218,0.08));
    border:1px solid var(--panel-border);border-radius:12px;padding:16px 12px 14px;text-align:center}
  .dash-recent-card.tier-bronze {border-color:rgba(205,127,50,0.55)}
  .dash-recent-card.tier-silver {border-color:rgba(201,209,217,0.55)}
  .dash-recent-card.tier-gold   {border-color:rgba(255,212,121,0.65);box-shadow:0 4px 22px -10px rgba(255,212,121,0.45)}
  .dash-recent-card.tier-special{border-color:rgba(155,109,255,0.65);box-shadow:0 4px 26px -10px rgba(155,109,255,0.55)}
  .drc-icon{font-size:34px;line-height:1;margin-bottom:6px}
  .drc-title{font-size:12px;font-weight:500;line-height:1.3}

  /* NEW pulse + pill */
  .dash-new-pill{position:absolute;top:8px;right:8px;font-size:9px;letter-spacing:0.14em;
    text-transform:uppercase;background:#3ddc84;color:#0a1230;
    padding:2px 7px;border-radius:99px;font-weight:700;z-index:1}
  .dash-new-count{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;
    background:#3ddc84;color:#0a1230;padding:3px 9px;border-radius:99px;font-weight:700}
  .is-new{animation:badge-pulse 2.4s ease-in-out infinite}
  @keyframes badge-pulse{
    0%, 100% { box-shadow: 0 4px 18px -8px rgba(61,220,132,0.55); }
    50%      { box-shadow: 0 4px 30px -4px rgba(61,220,132,0.95); }
  }

  /* Solo view */
  .solo-controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .solo-controls .field{flex:1;min-width:120px}
  .solo-controls button{flex-shrink:0}
  .solo-msg{margin-top:12px;font-size:13px;color:var(--muted)}
  .solo-msg.err{color:#ff7c7c}
  .solo-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .solo-num{text-align:center;padding:10px;background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);border-radius:10px}
  .solo-num-val{font-family:'Montserrat',sans-serif;font-size:40px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .solo-num-lbl{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:8px}
  .solo-verify{font-size:12px;font-weight:600;letter-spacing:0.04em;margin-bottom:12px;text-align:center}
  .solo-verify.good{color:#3ddc84}
  .solo-verify.bad{color:#e0a23c}
  .solo-chart-wrap{height:240px;background:rgba(0,0,0,0.22);border-radius:8px;padding:6px;margin-bottom:14px}
  .solo-chart-wrap canvas{width:100%;height:100%;display:block}
  textarea{background:rgba(255,255,255,0.06);color:var(--white);border:1px solid var(--panel-border);
    border-radius:8px;padding:11px 13px;font-size:14px;font-family:'Inter',sans-serif;width:100%;resize:vertical}
  textarea:focus{outline:none;border-color:var(--accent);background:rgba(82,48,218,0.12)}
  textarea::placeholder{color:var(--faint)}
  .led-bar{display:flex;gap:3px;height:26px}
  .led-cell{flex:1;background:rgba(255,255,255,0.06);border-radius:2px;transition:background .1s}
  .led-cell.lit.red{background:var(--red)}
  .led-cell.lit.yellow{background:var(--yellow)}
  .led-cell.lit.green{background:var(--green)}
  .eval-panel{text-align:center}
  .eval-level{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:600;margin-top:4px}
  .eval-meaning{color:var(--muted);font-size:14px;margin-top:4px}
  .eval-stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted);align-items:center}
  .eval-stats b{font-family:'Montserrat',sans-serif;font-size:20px;color:var(--white);margin-right:4px}
  .solo-saved{color:#3ddc84;font-size:12px;margin-top:12px}

  /* My measurements */
  .me-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:16px;margin-bottom:12px}
  .me-main{flex:1;min-width:0}
  .me-title-row{display:flex;align-items:center;gap:9px}
  .me-kind{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px;flex-shrink:0}
  .me-kind.solo{background:rgba(0,51,255,0.2);color:#9db4ff}
  .me-kind.session{background:rgba(82,48,218,0.25);color:#cdbcff}
  .me-kind.experiment{background:rgba(155,109,255,0.22);color:#b18bff}
  .me-title{font-family:'Montserrat',sans-serif;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .me-meta{font-size:12px;color:var(--muted);margin-top:4px}
  .me-host{display:inline-flex;align-items:center;gap:5px;vertical-align:middle}
  .me-host .sess-avatar{width:18px;height:18px;font-size:9px}
  .me-host-name{color:var(--white)}
  .me-stats{display:flex;gap:14px;flex-shrink:0;text-align:center}
  a.me-card{text-decoration:none;color:inherit;transition:border-color .2s}
  a.me-card:hover{border-color:var(--accent)}
  .d-meta{font-size:13px;color:var(--muted)}
  .d-comment{margin-top:18px;padding-top:16px;border-top:1px solid var(--panel-border)}
  .d-comment-lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .d-comment p{font-size:14px;line-height:1.6}
  .d-client-chip{display:inline-flex;align-items:center;gap:8px;margin-top:6px;
    padding:6px 12px 6px 6px;border-radius:24px;background:rgba(255,255,255,0.05);
    border:1px solid var(--panel-border)}
  .d-client-avatar{width:24px;height:24px;border-radius:50%;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .d-client-avatar img{width:100%;height:100%;object-fit:cover}
  .d-client-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:11px;color:#fff}
  .d-client-name{font-size:13px;color:var(--muted)}

  /* Clients energy wall */
  .energy-wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .client-card{display:flex;flex-direction:column;gap:12px;text-decoration:none;color:inherit;
    background:linear-gradient(160deg, rgba(82,48,218,0.18), rgba(0,51,255,0.06));
    border:1px solid var(--panel-border);border-radius:16px;padding:18px;transition:border-color .2s,transform .2s}
  .client-card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .client-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .client-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-left:auto}
  .client-avatar{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--accent))}
  .client-avatar img{width:100%;height:100%;object-fit:cover}
  .client-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:18px;color:#fff}
  .client-id{flex:1 1 140px;min-width:0}
  .client-name{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .client-sub{font-size:12px;color:var(--muted);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .client-spark{width:100%;height:48px;display:block}
  .client-metrics{display:flex;gap:16px}
  .cm{text-align:center}
  .cm-val{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:500}
  .cm-lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .client-level{font-size:13px;font-weight:600}
  .client-empty{font-size:13px;color:var(--faint)}
  .client-title-avatar{display:inline-flex;width:40px;height:40px;border-radius:50%;overflow:hidden;
    vertical-align:middle;margin-right:8px;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .client-title-avatar img{width:100%;height:100%;object-fit:cover}
  .client-title-avatar .avatar-initial{font-family:'Montserrat',sans-serif;font-weight:600;font-size:16px;color:#fff}
  .live-pill-mini{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;
    letter-spacing:0.12em;text-transform:uppercase;background:#c0143c;color:#fff;
    padding:3px 9px;border-radius:20px;margin-left:auto;flex-shrink:0}
  .live-pill-mini .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
  .client-card.live{border-color:#c0143c;box-shadow:0 0 0 1px rgba(192,20,60,0.35),0 6px 24px -10px rgba(192,20,60,0.55)}

  .client-live-banner{margin:14px 0;padding:18px 22px;border-radius:16px;
    background:linear-gradient(120deg, rgba(192,20,60,0.22), rgba(82,48,218,0.12));
    border:1px solid rgba(192,20,60,0.55);display:flex;flex-direction:column;gap:12px}
  .live-head{display:flex;align-items:center;gap:12px}
  .live-title{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:500}
  .live-metrics{display:flex;gap:22px}
  .lm{text-align:left}
  .lm-val{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:500}
  .lm-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .live-curve{width:100%;height:170px;display:block}

  /* Session Pulse: Host / Group / You — three curves on one chart */
  .session-pulse{margin:18px 0;padding:16px 18px;border-radius:14px;
    background:linear-gradient(120deg, rgba(82,48,218,0.18), rgba(0,51,255,0.06));
    border:1px solid var(--panel-border);display:flex;flex-direction:column;gap:14px}
  .sp-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .sp-title{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--muted)}
  .sp-legend{display:flex;gap:14px;margin-left:auto;flex-wrap:wrap}
  .leg-item{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .leg-dot{width:14px;height:3px;border-radius:2px;display:inline-block}
  .leg-host .leg-dot{background:#f5a623}
  .leg-group .leg-dot{background:#9db4ff}
  .leg-me .leg-dot{background:#ffffff}
  .sp-chart{width:100%;height:210px;display:block}
  .sp-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sp-col{background:rgba(255,255,255,0.03);border:1px solid var(--panel-border);
    border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-width:0}
  .sp-col-head{display:flex;align-items:center;gap:7px;min-width:0}
  .sp-col-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .sp-stats{display:flex;gap:14px}
  .ss{text-align:left;flex:1;min-width:0}
  .ss-val{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:500;font-variant-numeric:tabular-nums}
  .ss-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}

  @media (max-width:600px){
    #bleText{max-width:130px}
    .form-grid{grid-template-columns:1fr}
    .lb-spark{display:none}
    .res-stats{gap:10px}
    .rs{min-width:34px}
    .me-card{flex-direction:column;align-items:stretch;gap:10px;padding:14px}
    .me-title-row{flex-wrap:wrap}
    .me-stats{justify-content:space-between;gap:10px}
    .live-metrics{gap:14px}
    .lm-val{font-size:20px}
    .sp-metrics{grid-template-columns:1fr}
    .sp-chart{height:170px}
    .dash-stats{grid-template-columns:repeat(2,1fr)}
    .dash-next{grid-template-columns:1fr}
    .dash-badges{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
    .db-icon{font-size:28px}
    .db-title{font-size:12px;min-height:30px}
    .hl-name{display:none}
    .level-up-banner{padding:16px 18px;gap:10px}
    .lub-sparkle{font-size:24px}
    .lub-title{font-size:18px}
    .level-journey{grid-template-columns:1fr;gap:10px;padding:14px 16px;min-height:0}
    .lj-right{text-align:left;align-items:flex-start}
    .lj-title{font-size:22px}
    .lj-track{padding:14px 6px 22px}
    .lj-label{font-size:9px}
    .lj-marker .lj-label{display:none}
    .lj-marker.current .lj-label{display:block}
    .lb-podium{grid-template-columns:1fr;gap:10px}
    .lb-podium-card.place-1,
    .lb-podium-card.place-2,
    .lb-podium-card.place-3{order:initial}
    .lb-row{gap:10px;padding:9px 12px}
    .lb-row-rare{display:none}
    .lb-row-xp{font-size:14px}
  }

  /* Reserve space at the bottom of every page so the floating + button never
     covers the last CTA / form action. The FAB sits ~84px up from the bottom
     edge, so mobile keeps a roomier clearance than desktop. */
  #view{padding-bottom:48px}
  @media (max-width:600px){ #view{padding-bottom:104px} }

  /* Floating Action Button — primary "start" action, always one tap away.
     Fallbacks for older browsers; env(safe-area-inset-*) for notches / gesture bars. */
  .fab{position:fixed;
    bottom:24px;right:24px;                                    /* fallback */
    bottom:calc(24px + env(safe-area-inset-bottom, 0px));
    right:calc(24px + env(safe-area-inset-right, 0px));
    z-index:1000;
    width:60px;height:60px;border-radius:50%;
    background:var(--accent);color:#fff;border:none;cursor:pointer;
    font-family:'Montserrat',sans-serif;font-size:32px;line-height:1;font-weight:300;
    padding:0;display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 28px -6px rgba(82,48,218,0.75), 0 4px 12px -2px rgba(0,0,0,0.5);
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease}
  .fab:hover{transform:translateY(-2px);
    box-shadow:0 14px 36px -8px rgba(82,48,218,0.85), 0 6px 18px -2px rgba(0,0,0,0.55)}
  .fab:active{transform:translateY(0)}
  .fab.open{transform:rotate(45deg)}
  .fab.open:hover{transform:rotate(45deg) translateY(-2px)}

  .fab-menu{position:fixed;
    bottom:96px;right:24px;                                    /* fallback */
    bottom:calc(96px + env(safe-area-inset-bottom, 0px));
    right:calc(24px + env(safe-area-inset-right, 0px));
    z-index:1001;
    background:linear-gradient(160deg, rgba(13,11,40,0.97), rgba(82,48,218,0.22));
    border:1px solid rgba(155,109,255,0.5);border-radius:14px;
    padding:8px;min-width:220px;
    box-shadow:0 24px 60px -16px rgba(0,0,0,0.7);
    animation:fab-menu-in .16s ease-out}
  @keyframes fab-menu-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fab-item{display:flex;align-items:center;gap:14px;
    padding:12px 14px;border-radius:10px;
    text-decoration:none;color:#fff;font-family:'Inter',sans-serif;font-size:14px;
    transition:background .15s}
  .fab-item:hover{background:rgba(155,109,255,0.18)}
  .fab-icon{font-size:22px;line-height:1;flex-shrink:0}

  @media (max-width:600px){
    .fab{
      bottom:20px;right:20px;
      bottom:calc(20px + env(safe-area-inset-bottom, 0px));
      right:calc(20px + env(safe-area-inset-right, 0px));
      width:60px;height:60px;font-size:32px}
    .fab-menu{
      bottom:92px;right:20px;
      bottom:calc(92px + env(safe-area-inset-bottom, 0px));
      right:calc(20px + env(safe-area-inset-right, 0px));
      min-width:200px}
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="wordmark">egely wheel</div>
  <nav class="nav">
    <a href="#/home" data-route="/home">Home</a>
    <a href="#/experiments" data-route="/experiments">Experiments</a>
    <a href="#/sessions" data-route="/sessions" class="nav-secondary">Sessions</a>
    <a href="#/leaderboard" data-route="/leaderboard" class="nav-secondary">Global Ranking</a>
    <button type="button" class="nav-more" id="navMore" aria-label="More" aria-haspopup="true" aria-expanded="false">⋯</button>
    <div class="nav-more-menu" id="navMoreMenu" hidden>
      <a href="#/sessions" data-route="/sessions">Sessions</a>
      <a href="#/leaderboard" data-route="/leaderboard">Global Ranking</a>
    </div>
  </nav>
  <div class="ble-bar idle" id="bleBar">
    <span class="dot"></span>
    <span id="bleText">Egely Wheel not connected</span>
    <button id="bleBtn">Connect</button>
  </div>
  <div class="auth-area" id="authArea"></div>
</header>

<main id="view"></main>

<button type="button" class="fab" id="fab" aria-label="Start a measurement" aria-haspopup="true" aria-expanded="false" hidden>+</button>
<div class="fab-menu" id="fabMenu" hidden>
  <a href="#/solo" class="fab-item" data-fab-item>
    <span class="fab-icon">🎯</span>
    <span class="fab-label">Solo Measurement</span>
  </a>
  <a href="#/sessions/new" class="fab-item" data-fab-item>
    <span class="fab-icon">🤝</span>
    <span class="fab-label">Group Session</span>
  </a>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
