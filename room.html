<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egely Wheel · Session Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<style>
  .demo-banner{
    background:rgba(233,210,74,0.12);border:1px solid rgba(233,210,74,0.4);
    color:#f0e08a;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:20px;
  }

  header{display:flex;flex-direction:column;gap:4px;margin-bottom:18px}
  .room-title-row{display:flex;align-items:center;gap:14px;margin-top:8px;flex-wrap:wrap}
  .room-title{font-size:30px;font-weight:500}
  .live-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;
    letter-spacing:0.1em;text-transform:uppercase;background:var(--accent);
    padding:5px 12px;border-radius:20px}
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.3}}
  .room-sub{color:var(--muted);font-size:14px}

  /* Session leader banner */
  .leader-banner{display:flex;flex-direction:column;
    background:linear-gradient(120deg, rgba(82,48,218,0.35), rgba(0,51,255,0.16));
    border:1px solid rgba(82,48,218,0.6);border-radius:14px;padding:16px 20px;margin:18px 0}
  .lb-top{display:flex;align-items:center;gap:16px}
  .leader-banner .avatar.lg{width:52px;height:52px;font-size:20px}
  .lb-info{flex-shrink:0;min-width:0}
  .lb-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
  .lb-name{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-spark{flex:1;min-width:80px;height:40px;display:block;
    background:rgba(0,0,0,0.18);border-radius:6px}
  .lb-metrics{display:flex;gap:18px;flex-shrink:0;text-align:center}
  .lb-expand{background:rgba(255,255,255,0.08);border:1px solid var(--panel-border);
    color:var(--white);width:36px;height:36px;border-radius:9px;font-size:13px;
    cursor:pointer;flex-shrink:0;transition:transform .25s, background .2s;
    padding:0;display:flex;align-items:center;justify-content:center}
  .lb-expand:hover{background:rgba(255,255,255,0.16)}
  .lb-expand.open{transform:rotate(180deg)}
  .lb-chart-wrap{margin-top:14px}
  .lb-chart{width:100%;height:170px;display:block;background:rgba(0,0,0,0.22);border-radius:8px}
  @media (max-width:600px){.lb-spark{display:none}}

  /* Group stats bar */
  .group-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}
  .gstat{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;
    padding:14px 16px;text-align:center}
  .gstat.time{background:rgba(82,48,218,0.14);border-color:rgba(82,48,218,0.5)}
  .gval{font-family:'Montserrat',sans-serif;font-size:32px;font-weight:600;line-height:1;
    font-variant-numeric:tabular-nums}
  .glbl{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:7px}

  /* Vitality color scale legend */
  .scale{margin:18px 0 22px}
  .scale-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .scale-bar{height:12px;border-radius:6px;
    background:linear-gradient(90deg,
      var(--red) 0%, var(--red) 21%,
      var(--yellow) 25%, var(--yellow) 50%,
      var(--green) 54%, var(--green) 100%);
  }
  .scale-ticks{display:flex;justify-content:space-between;font-size:10px;
    color:var(--faint);font-family:'Montserrat',sans-serif;margin-top:5px}

  .board{display:flex;flex-direction:column;gap:12px}
  .racer{
    background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;
    padding:14px 18px;display:flex;align-items:center;gap:16px;
    transition:transform .35s ease, border-color .3s;
  }
  .racer.leader{border-color:var(--accent);background:rgba(82,48,218,0.12)}
  .rank{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;
    color:var(--faint);width:24px;text-align:center;flex-shrink:0}
  .racer.leader .rank{color:var(--white)}
  .avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Montserrat',sans-serif;font-weight:600;font-size:16px;color:#fff;
    background:linear-gradient(135deg,var(--blue),var(--accent))}
  .racer-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
  .racer-name-row{display:flex;align-items:center;gap:8px;min-width:0}
  .racer-name{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .host-tag{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;
    background:rgba(82,48,218,0.3);border:1px solid rgba(82,48,218,0.6);color:#cdbcff;
    padding:2px 7px;border-radius:20px;flex-shrink:0}
  .spark{width:100%;height:32px;display:block;
    background:rgba(0,0,0,0.18);border-radius:5px}
  .metrics{display:flex;align-items:flex-start;gap:16px;flex-shrink:0;text-align:center}
  .metric{display:flex;flex-direction:column;align-items:center;min-width:42px}
  .metric-val{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:600;line-height:1;
    font-variant-numeric:tabular-nums;transition:color .2s}
  .metric-val.avg{color:var(--white)}
  .metric-val.samples{font-size:18px;color:var(--muted)}
  .metric-lbl{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-top:6px}
</style>
</head>
<body>

<div class="demo-banner">
  Preview with demo data — simulated racers, looping session. Real Egely Wheel + live sync comes next.
</div>

<header>
  <div class="wordmark">egely wheel</div>
  <div class="room-title-row">
    <span class="room-title" id="roomTitle">Sunday Morning Meditation</span>
    <span class="live-pill"><span class="dot"></span>Live</span>
  </div>
  <div class="room-sub" id="roomSub">Hosted by Anna · 5 racers connected</div>
</header>

<div class="leader-banner">
  <div class="lb-top">
    <div class="avatar lg" id="lbAvatar"></div>
    <div class="lb-info">
      <div class="lb-label">Session host</div>
      <div class="lb-name" id="lbName">—</div>
    </div>
    <canvas class="lb-spark" id="lbSpark"></canvas>
    <div class="lb-metrics">
      <div class="metric"><div class="metric-val live" id="lbLive">0</div><div class="metric-lbl">Live</div></div>
      <div class="metric"><div class="metric-val avg" id="lbAvg">0.0</div><div class="metric-lbl">Avg</div></div>
    </div>
    <button class="lb-expand" id="lbExpand" title="Expand live chart">&#9662;</button>
  </div>
  <div class="lb-chart-wrap" id="lbChartWrap" hidden>
    <canvas class="lb-chart" id="lbChart"></canvas>
  </div>
</div>

<div class="group-bar">
  <div class="gstat time"><div class="gval" id="gTime">0:00</div><div class="glbl">Time left</div></div>
  <div class="gstat"><div class="gval" id="gLive">0.0</div><div class="glbl">Group live</div></div>
  <div class="gstat"><div class="gval" id="gAvg">0.0</div><div class="glbl">Group avg</div></div>
</div>

<div class="scale">
  <div class="scale-label">Vitality scale</div>
  <div class="scale-bar"></div>
  <div class="scale-ticks"><span>0</span><span>6</span><span>13</span><span>24</span></div>
</div>

<div class="board" id="board"></div>

<script type="module">
// ---- Vitality color (from Egely Wheel Vitality Scale) -----------------------
function vitalityColor(led){
  if(led <= 5) return '#C0143C';   // red
  if(led <= 12) return '#E9D24A';  // yellow
  return '#3CC98A';                // green
}

// ---- Demo session -----------------------------------------------------------
const SESSION_MS = 90000;        // demo session length (real value comes from the session)
const STEP_MS = 500;             // sample cadence
let sessionStart = Date.now();

function newRacer(name, led, host = false){
  return { name, led, sum:led, count:1, history:[{ t:0, led }], host };
}
let racers = [
  newRacer('Anna', 8, true),   // session host: created/started this session
  newRacer('Csaba', 14),
  newRacer('Béla', 4),
  newRacer('Dóra', 11),
  newRacer('Emil', 18),
];

const board = document.getElementById('board');

function buildCard(r){
  const card = document.createElement('div');
  card.className = 'racer';

  const rank = document.createElement('div');
  rank.className = 'rank';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = r.name.charAt(0).toUpperCase();

  const mid = document.createElement('div');
  mid.className = 'racer-mid';
  const nameRow = document.createElement('div');
  nameRow.className = 'racer-name-row';
  const name = document.createElement('div');
  name.className = 'racer-name';
  name.textContent = r.name;
  nameRow.append(name);
  if(r.host){
    const tag = document.createElement('span');
    tag.className = 'host-tag';
    tag.textContent = 'Host';
    nameRow.append(tag);
  }
  const spark = document.createElement('canvas');
  spark.className = 'spark';
  mid.append(nameRow, spark);

  const metrics = document.createElement('div');
  metrics.className = 'metrics';
  const live = mkMetric('live', 'Live');
  const avg = mkMetric('avg', 'Avg');
  metrics.append(live.wrap, avg.wrap);

  card.append(rank, avatar, mid, metrics);
  board.appendChild(card);

  r.el = { card, rank, liveVal:live.val, avgVal:avg.val, spark };
}

function mkMetric(cls, label){
  const wrap = document.createElement('div');
  wrap.className = 'metric';
  const val = document.createElement('div');
  val.className = 'metric-val ' + cls;
  const lbl = document.createElement('div');
  lbl.className = 'metric-lbl';
  lbl.textContent = label;
  wrap.append(val, lbl);
  return { wrap, val };
}

racers.forEach(buildCard);

// Draws a curve whose X axis spans the FULL session length, so the line grows
// left -> right as time passes. Used for the small card sparklines, the leader
// mini-spark, and the expanded leader chart.
function drawCurve(canvas, history, color, opts = {}){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(!w || !h) return;
  const dpr = window.devicePixelRatio || 1;
  if(canvas.width !== Math.round(w * dpr)){ canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr); }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const pad = opts.big ? 8 : 2;
  const xOf = t => (t / SESSION_MS) * w;
  const yOf = led => h - (led / 24) * (h - pad * 2) - pad;
  if(opts.grid){
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    for(let i = 0; i <= 4; i++){
      const y = (h / 4) * i;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
  }
  if(history.length < 2) return;
  const trace = () => history.forEach((pt, i) => {
    const x = xOf(pt.t), y = yOf(pt.led);
    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  if(opts.fill){
    ctx.beginPath(); trace();
    ctx.lineTo(xOf(history[history.length - 1].t), h);
    ctx.lineTo(xOf(history[0].t), h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color + '55');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad; ctx.fill();
  }
  ctx.beginPath(); trace();
  ctx.strokeStyle = color;
  ctx.lineWidth = opts.big ? 2.5 : 2;
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function render(){
  const sorted = [...racers].sort((a, b) => b.led - a.led);
  sorted.forEach((r, i) => {
    board.appendChild(r.el.card); // reorder, preserves canvas state
    r.el.rank.textContent = i + 1;
    r.el.card.classList.toggle('leader', i === 0);
    r.el.liveVal.textContent = r.led;
    r.el.liveVal.style.color = vitalityColor(r.led);
    r.el.avgVal.textContent = (r.sum / r.count).toFixed(1);
    drawCurve(r.el.spark, r.history, vitalityColor(r.led));
  });
  const host = racers.find(r => r.host) || racers[0];
  const hostColor = vitalityColor(host.led);
  document.getElementById('lbAvatar').textContent = host.name.charAt(0).toUpperCase();
  document.getElementById('lbName').textContent = host.name;
  const lbLive = document.getElementById('lbLive');
  lbLive.textContent = host.led;
  lbLive.style.color = hostColor;
  document.getElementById('lbAvg').textContent = (host.sum / host.count).toFixed(1);
  drawCurve(document.getElementById('lbSpark'), host.history, hostColor);
  if(leaderExpanded){
    drawCurve(document.getElementById('lbChart'), host.history, hostColor, { big:true, fill:true, grid:true });
  }
  updateGroupStats();
}

function updateGroupStats(){
  const elapsed = Math.min(Date.now() - sessionStart, SESSION_MS);
  const left = Math.max(0, SESSION_MS - elapsed);
  const sec = Math.floor(left / 1000);
  document.getElementById('gTime').textContent = `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
  const groupLive = racers.reduce((s, r) => s + r.led, 0) / racers.length;
  const groupAvg = racers.reduce((s, r) => s + r.sum / r.count, 0) / racers.length;
  document.getElementById('gLive').textContent = groupLive.toFixed(1);
  const gAvgEl = document.getElementById('gAvg');
  gAvgEl.textContent = groupAvg.toFixed(1);
  gAvgEl.style.color = vitalityColor(groupAvg);
}

// ---- Demo animation: random walk, restarts when the session ends ------------
function step(){
  const elapsed = Date.now() - sessionStart;
  if(elapsed >= SESSION_MS){
    sessionStart = Date.now();
    racers = racers.map((r) => {
      const fresh = newRacer(r.name, Math.floor(Math.random() * 20) + 2, r.host);
      fresh.el = r.el;
      return fresh;
    });
    render();
    return;
  }
  for(const r of racers){
    let next = r.led + Math.round((Math.random() - 0.45) * 4);
    next = Math.max(0, Math.min(24, next));
    r.led = next;
    r.sum += next;
    r.count++;
    r.history.push({ t: elapsed, led: next });
  }
  render();
}

// ---- Expandable leader chart ------------------------------------------------
let leaderExpanded = false;
document.getElementById('lbExpand').addEventListener('click', () => {
  leaderExpanded = !leaderExpanded;
  document.getElementById('lbChartWrap').hidden = !leaderExpanded;
  document.getElementById('lbExpand').classList.toggle('open', leaderExpanded);
  render();
});

render();
setInterval(step, STEP_MS);
window.addEventListener('resize', render);
</script>

</body>
</html>
